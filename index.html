<head>

<style>

.btn:hover{background:var(--sur2)}.bp{background:var(--navy);color:#fff;border-color:var(--navy)}.bp:hover{background:var(--navyd)}.bgo{background:var(--goldl);color:var(--gold);border-color:var(--goldb)}.br2{background:var(--redl);color:var(--red);border-color:var(--redb)}.bgn2{background:var(--grnl);color:var(--grn);border-color:var(--grnb)}.ba{background:var(--ambl);color:var(--amb);border-color:var(--ambb)}.bsm{font-size:11px;padding:4px 9px}

.pim{font-size:10px;color:var(--t3);text-align:center;padding:3px;background:rgba(0,0,0,.02);border-radius:4px}
.mi2{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:5px;background:var(--grnl);border:1px solid var(--grnb);margin-bottom:3px}
.mid{width:5px;height:5px;border-radius:50%;background:var(--grn);flex-shrink:0}
.min{font-size:11.5px;color:var(--grn);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.wn{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 15px;display:flex;align-items:center;justify-content:space-between;gap:9px;flex-wrap:wrap;margin-bottom:11px;transition:background .2s}
.wnt{font-size:14px;font-weight:700;color:var(--tx)}.wns{font-size:11px;color:var(--t3);margin-top:1px}
.wbts{display:flex;align-items:center;gap:6px}
.nb{width:28px;height:28px;border-radius:50%;border:1px solid var(--bdr2);background:var(--sur);color:var(--tx);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-family:inherit;transition:all .13s}
.nb:hover{background:var(--navyl);color:var(--navy)}.nb:disabled{opacity:.3;cursor:not-allowed}
.tb{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--bdr2);background:var(--sur);color:var(--t2);cursor:pointer;font-family:inherit;transition:all .13s}
.tb:hover{background:var(--navyl);color:var(--navy)}.tb.cur{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:500}
.ws{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:9px}
.wsi{display:flex;align-items:center;gap:7px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rs);padding:7px 12px;transition:background .2s}
.wsd{width:8px;height:8px;border-radius:50%;flex-shrink:0}.wsv{font-size:14px;font-weight:700;color:var(--tx)}.wsl{font-size:10.5px;color:var(--t3)}
.wsp{flex:1;min-width:170px;display:flex;align-items:center;gap:8px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rs);padding:7px 12px;transition:background .2s}
.pt2{flex:1;height:5px;background:var(--sur2);border-radius:3px;overflow:hidden}.pf2{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--grn),#4ADE80)}
.eye{background:none;border:none;cursor:pointer;padding:3px 4px;border-radius:5px;display:flex;align-items:center;justify-content:center;transition:all .14s;flex-shrink:0;opacity:.3}
.eye:hover{opacity:1;background:var(--sur2)}.eye.act{opacity:1;background:var(--navyl)}
.eye svg{width:14px;height:14px;color:var(--t2)}
.ip{display:none;padding:9px 13px 11px 30px;border-top:1px dashed var(--bdr);animation:sd .18s ease}
.ip.open{display:block}@keyframes sd{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.ipg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ipll{font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:2px}
.iplv{font-size:12.5px;font-weight:600;color:var(--tx)}
.iag{display:flex;align-items:center;gap:6px;margin-top:7px;padding-top:7px;border-top:1px solid var(--bdr)}
.ajtabs{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:16px}
.ajtab{font-size:13px;padding:8px 14px;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .13s}
.ajtab.act{color:var(--navy);border-bottom-color:var(--navy);font-weight:600}
.mrow{display:flex;align-items:center;gap:9px;padding:10px 14px;border-bottom:1px solid var(--bdr)}
.mrow:last-child{border-bottom:none}.mhdl{color:var(--t3);cursor:grab;font-size:15px}
.mtext{font-size:13px;color:var(--tx);flex:1}
.hcard{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:10px;transition:background .2s}
.hreg{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr)}
.hreg:last-child{border-bottom:none}.hrd{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
.hrt{font-size:12px;color:var(--t2);line-height:1.4}
.tgsw{display:flex;align-items:center;gap:8px}
.tsw{width:34px;height:18px;border-radius:9px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tsw.on{background:var(--navy)}.tsw.off{background:var(--bdr2)}
.tknob{width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tsw.on .tknob{left:18px}.tsw.off .tknob{left:2px}
.tlbl{font-size:12px;color:var(--t2)}
.mdg{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:7px}
.mday{display:flex;flex-direction:column;align-items:center;gap:3px}
.mdlbl{font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.mday input{width:100%;font-size:11.5px;padding:5px 3px;text-align:center;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--sur);color:var(--tx);font-family:inherit}
.mday input.diff{border-color:var(--goldb);background:var(--goldl);color:var(--gold)}
.crl{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--bdr)}
.crl:last-child{border-bottom:none}.crln{font-size:13px;color:var(--tx);flex:1}
.crlbw{width:80px;height:4px;background:var(--sur2);border-radius:2px;overflow:hidden;transition:background .2s}
.crlf{height:100%;border-radius:2px}.crlp{font-size:11.5px;color:var(--t3);width:26px;text-align:right}
.mb2{border-radius:var(--rs);padding:13px;border:1px solid var(--bdr);margin-bottom:9px}
.mb2.reg{background:var(--navyl)}.mb2.hist{background:var(--goldl)}
.mb2t{font-size:11.5px;font-weight:600;margin-bottom:9px}
.mb2.reg .mb2t{color:var(--navy)}.mb2.hist .mb2t{color:var(--gold)}
.mb2ns{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.mb2n{font-size:20px;font-weight:700}
.mb2.reg .mb2n{color:var(--navy)}.mb2.hist .mb2n{color:var(--gold)}
.mb2l{font-size:10px;color:var(--t3);margin-top:1px}
.dc2{display:flex;flex-direction:column;align-items:center;gap:1px}
.dn{font-size:13px;font-weight:700;line-height:1}.dp2{font-size:10px;font-weight:500;line-height:1;opacity:.8}
.co{color:var(--gold)}.cok{color:var(--grn)}.cl{color:var(--red)}.cpr{color:var(--t3)}
.prbg{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:20px}
.prok{background:var(--grnl);color:var(--grn)}.prov{background:var(--goldl);color:var(--gold)}.prl{background:var(--redl);color:var(--red)}
.repbts{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:16px}
.repbt{font-size:13px;padding:8px 14px;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .13s}
.repbt.act{color:var(--navy);border-bottom-color:var(--navy);font-weight:600}
.metl{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--t2);cursor:pointer;padding:7px 11px;border:1px solid var(--bdr);border-radius:var(--rs);background:var(--sur);transition:background .13s}
.metl:hover{background:var(--sur2)}.metl input{accent-color:var(--navy)}
.pvbx{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rs);padding:11px;transition:background .2s}
.pvrow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.pvrow:last-child{border-bottom:none}.pvl{color:var(--t3)}.pvv{color:var(--tx);font-weight:500}
.ttab{font-size:11.5px;padding:4px 11px;border-radius:20px;border:1px solid var(--bdr2);background:var(--sur);color:var(--t2);cursor:pointer;font-family:inherit;transition:all .12s}
.ttab.all{background:var(--navyl);color:var(--navy);border-color:rgba(59,75,140,.2);font-weight:500}
.ttab.hist{background:var(--goldl);color:var(--gold);border-color:var(--goldb);font-weight:500}
.mbox{display:flex;align-items:center;flex-wrap:wrap;gap:5px;padding:5px 9px;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--sur);cursor:text;min-height:38px;transition:all .13s}
.mbox:focus-within{border-color:var(--navy)}
.mini{border:none;outline:none;background:transparent;font-size:12.5px;color:var(--tx);font-family:inherit;min-width:90px;flex:1}
.mini::placeholder{color:var(--t3)}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:10px}
.maps-btn{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;padding:5px 11px;border-radius:var(--rs);background:#E8F5E9;color:#1B5E20;border:1px solid rgba(27,94,32,.2);cursor:pointer;font-family:inherit;transition:all .13s;white-space:nowrap;text-decoration:none}
.maps-btn:hover{background:#1B5E20;color:#fff}
.maps-btn svg{width:13px;height:13px;flex-shrink:0}
.dir-hint{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:#F1F8E9;border:1px solid rgba(27,94,32,.15);border-radius:var(--rs);gap:10px;flex-wrap:wrap}
.dir-hint-text{font-size:12px;color:#2E7D32;flex:1}
.alert-20h{background:var(--redl);border:1.5px solid var(--redb);border-radius:var(--r);padding:13px 16px;margin-bottom:14px;animation:pulse20 2s infinite}
@keyframes pulse20{0%,100%{border-color:var(--redb)}50%{border-color:var(--red)}}
.alert-20h-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--red);margin-bottom:9px}
.alert-20h-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:rgba(185,28,28,.06);border-radius:var(--rs);margin-bottom:5px;gap:10px}
.alert-20h-item:last-child{margin-bottom:0}
.alert-20h-name{font-size:13px;font-weight:500;color:var(--tx);flex:1}
.alert-20h-time{font-size:12.5px;font-weight:700;color:var(--red);white-space:nowrap}
.alert-20h-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--red);color:#fff;white-space:nowrap}
.cal-filter{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 15px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:11px;transition:background .2s}
.cal-filter label{font-size:12px;color:var(--t2);font-weight:500;white-space:nowrap}
.cal-filter input[type=date]{font-size:12px;padding:5px 9px;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--sur);color:var(--tx);font-family:inherit}
.cal-filter input[type=date]:focus{outline:none;border-color:var(--navy)}
</style>

// ── CALENDAR HELPERS ──
function seed(o,id){var h=0;for(var i=0;i<id.length;i++)h=(h*31+id.charCodeAt(i)+o*17)&0xffff;return h;}
function cdd(diff){
  var d=new Date();d.setDate(d.getDate()+diff);var dw=d.getDay();
  if(diff>0||dw===0||dw===6)return null;
  return CS.map(function(t){
    var s=seed(diff,t.id);
    var ok=(s%100)<(diff<-4?90:diff<-2?75:diff<0?65:55);
    var ug=(s%7)===0&&!ok;
    var h=ok?0:Math.floor(((s%20)+8)+(Math.abs(diff)*6));
    return {id:t.id,n:t.n,ok:ok,ug:ug,h:h};
  });
}
function fdt(d){return d.toLocaleDateString('es-CO',{day:'2-digit',month:'short'});}
function dws(d){return['Dom','Lun','Mar','Mie','Jue','Vie','Sab'][d.getDay()];}
function fH(h){if(h<1)return'<1h';if(h<24)return h+'h';return Math.floor(h/24)+'d '+(h%24)+'h';}
function isTd(d){return d.toDateString()===TODAY.toDateString();}
function getWD(){
  var wd=TODAY.getDay();var dm=wd===0?-6:1-wd;
  var m=new Date(TODAY);m.setDate(TODAY.getDate()+dm+wOff*7);
  var result=[];
  for(var i=0;i<6;i++){var d=new Date(m);d.setDate(m.getDate()+i);result.push({date:d,diff:Math.round((d-TODAY)/(1000*60*60*24))});}
  return result;
}
function wkTitle(){
  if(wOff===0)return'Esta semana';
  if(wOff===-1)return'Semana anterior';
  if(wOff===-2)return'Hace 2 semanas';
  var d=getWD();return fdt(d[0].date)+' - '+fdt(d[5].date);
}

function calDayH(date,diff){
  var data=cdd(diff);var isFut=diff>0;var tod=isTd(date);
  if(isFut){
    return '<div class="cd fut"><div class="cdh"><div><div class="cdow">'+dws(date)+'</div><div class="cdate" style="color:var(--t3);font-size:17px">'+date.getDate()+'</div></div></div><div style="font-size:11.5px;color:var(--t3);text-align:center;padding:28px 10px">Proximo</div></div>';
  }
  var ok=data.filter(function(t){return t.ok;}),ug=data.filter(function(t){return t.ug;}),pn=data.filter(function(t){return !t.ok&&!t.ug;});
  var pct=Math.round(ok.length/data.length*100);
  var pc=pct===100?'var(--grn)':pct>60?'#5BC27A':'var(--amb)';
  var sU=ug.slice(0,2),sP=pn.slice(0,3-sU.length);
  var more=(ug.length-sU.length)+(pn.length-sP.length);
  var html='<div class="cd'+(tod?' tod':'')+'" onclick="openCalD('+diff+')">';
  html+='<div class="cdh"><div><div class="cdow" style="'+(tod?'color:var(--navy);font-weight:800':'')+'">'+dws(date)+'</div><div class="cdate">'+date.getDate()+'</div></div>';
  html+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">';
  if(ug.length)html+='<div class="csi"><div class="csd" style="background:var(--red)"></div><span style="color:var(--red);font-size:11.5px;font-weight:600">'+ug.length+'</span></div>';
  html+='<div class="csi"><div class="csd" style="background:var(--amb)"></div><span style="color:var(--amb);font-size:11.5px;font-weight:600">'+pn.length+'</span></div>';
  html+='<div class="csi"><div class="csd" style="background:var(--grn)"></div><span style="color:var(--grn);font-size:11.5px;font-weight:600">'+ok.length+'</span></div>';
  html+='<div class="cprog" style="width:66px;margin-top:2px"><div class="cpf2" style="width:'+pct+'%;background:'+pc+'"></div></div>';
  html+='</div></div><div class="cdb">';
  if(sU.length||sP.length){
    html+='<div><div class="slbl">Sin gestionar</div>';
    sU.forEach(function(t){html+='<div class="pi piu"><span class="pin">'+t.n+'</span><span class="pit pitu">'+fH(t.h)+'</span></div>';});
    sP.forEach(function(t){html+='<div class="pi pip"><span class="pin">'+t.n+'</span><span class="pit pitp">'+fH(t.h)+'</span></div>';});
    if(more>0)html+='<div class="pim">+ '+more+' mas</div>';
    html+='</div>';
  }
  var sOk=ok.slice(0,3);
  if(sOk.length){
    html+='<div><div class="slbl">Gestionadas</div>';
    sOk.forEach(function(t){html+='<div class="mi2"><div class="mid"></div><span class="min">'+t.n+'</span></div>';});
    if(ok.length>3)html+='<div class="pim">+ '+(ok.length-3)+' mas</div>';
    html+='</div>';
  }
  html+='</div></div>';
  return html;
}

// ── FILTER TIENDAS ──
function filterTiendas(){
  var buscar=(document.getElementById('tf-buscar')?document.getElementById('tf-buscar').value:'').toLowerCase();
  var estado=document.getElementById('tf-estado')?document.getElementById('tf-estado').value:'';
  var tipo=document.getElementById('tf-tipo')?document.getElementById('tf-tipo').value:'';
  var pais=document.getElementById('tf-pais')?document.getElementById('tf-pais').value:'';
  var isAg=role==='ag';
  var filtered=TIENDAS.filter(function(t){
    if(buscar&&t.n.toLowerCase().indexOf(buscar)===-1)return false;
    if(estado==='Urgente'&&!t.urg)return false;
    if(estado==='Pendiente'&&t.est!=='Pendiente')return false;
    if(estado==='Al dia'&&t.est!=='Al dia')return false;
    if(tipo==='reg'&&!t.reg)return false;
    if(tipo==='hist'&&!t.hist2)return false;
    if(pais&&t.pais!==pais)return false;
    return true;
  });
  var stats=document.getElementById('tstats');
  var novsbar=document.getElementById('tnovsbar');
  if(stats){
    var totalReg=filtered.reduce(function(s,t){return s+(t.reg||0);},0);
    var totalHist=filtered.reduce(function(s,t){return s+(t.hist||0);},0);
    var totalCas=filtered.reduce(function(s,t){return s+(t.cas||0);},0);
    var totalNov=totalReg+totalHist+totalCas;
    var nUrg=filtered.filter(function(t){return t.urg;}).length;
    var nPen=filtered.filter(function(t){return t.est==='Pendiente';}).length;
    var nH2=filtered.filter(function(t){return t.hist2;}).length;
    var nAlDia=filtered.filter(function(t){return t.est==='Al dia';}).length;
    var hayFiltro=pais||estado||tipo||buscar;
    var filLabel=filtered.length<TIENDAS.length?' <span style="font-size:10px;color:var(--t3)">de '+TIENDAS.length+'</span>':'';
    stats.innerHTML=
      '<div class="sc" style="border-top:2px solid var(--navy)"><div class="sn">'+filtered.length+filLabel+'</div><div class="sl">Tiendas'+(hayFiltro?' (filtradas)':' activas')+'</div></div>'
      +'<div class="sc" style="border-top:2px solid var(--red)"><div class="sn" style="color:var(--red)">'+nUrg+'</div><div class="sl">Urgentes</div></div>'
      +'<div class="sc" style="border-top:2px solid var(--amb)"><div class="sn" style="color:var(--amb)">'+nPen+'</div><div class="sl">Con pendientes</div></div>'
      +'<div class="sc" style="border-top:2px solid var(--gold)"><div class="sn" style="color:var(--gold)">'+nH2+'</div><div class="sl">Con historicas</div></div>'
      +'<div class="sc" style="border-top:2px solid var(--grn)"><div class="sn" style="color:var(--grn)">'+nAlDia+'</div><div class="sl">Al dia</div></div>';
    if(novsbar){
      novsbar.innerHTML=
        '<span style="font-size:12px;color:var(--navy);font-weight:600">Novedades pendientes</span>'
        +'<span style="font-size:12.5px;color:var(--t2)">Regulares: <strong style="color:var(--navy)">'+totalReg+'</strong></span>'
        +'<span style="font-size:12.5px;color:var(--t2)">Historicas: <strong style="color:var(--gold)">'+totalHist+'</strong></span>'
        +'<span style="font-size:12.5px;color:var(--t2)">CAS abiertos: <strong style="color:var(--red)">'+totalCas+'</strong></span>'
        +'<span style="margin-left:auto;background:var(--navy);color:#fff;font-size:12px;font-weight:600;padding:4px 14px;border-radius:20px">Total: '+totalNov+'</span>';
    }
  }
  var tbody=document.getElementById('ttbody');
  if(!tbody)return;
  if(filtered.length===0){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:28px;color:var(--t3);font-size:13px">No hay tiendas que coincidan con los filtros.</td></tr>';return;}
  var rows='';
  filtered.forEach(function(t){
    var rowCls=t.urg?'ru':t.hist2?'rh':'';
    var pbarCls=t.urg?'pbn':t.hist2?'pbg':'pbgn';
    var urgTag=t.urg?'<span class="utag">&#x1F6A9; Urgente</span>':'';
    var histTag=(t.hist2&&!t.urg)?'<span class="htag">&#x1F550; Historica</span>':'';
    var regColor=t.reg>0?'color:var(--red);font-weight:600':'color:var(--t3)';
    var hisColor=t.hist>0?'color:var(--gold);font-weight:600':'color:var(--t3)';
    var estBadge=t.est==='Urgente'?'br':t.est==='Pendiente'?'bg':'bgn';
    var paisLabel=PAISES[t.pais]||t.pais;
    var btnHtml='';
    if(isAg){
      btnHtml='<button class="btn bp bsm" onclick="goPage(\'td\')">Gestionar</button>';
    } else {
      var urgBtn=t.urg
        ?'<button class="btn bsm" onclick="openSMo(\'qu\',\''+t.n+'\')">Quitar urg.</button>'
        :'<button class="btn br2 bsm" onclick="openSMo(\'mu\',\''+t.n+'\')">Urgente</button>';
      var histBtn=t.hist2
        ?'<button class="btn bsm" style="color:var(--gold);border-color:var(--goldb)" onclick="openSMo(\'qh\',\''+t.n+'\')">Quitar hist.</button>'
        :'<button class="btn bgo bsm" onclick="openSMo(\'mh\',\''+t.n+'\')">Historica</button>';
      btnHtml=urgBtn+histBtn+'<button class="btn bp bsm" onclick="goPage(\'anl\')">Analizar</button>';
    }
    rows+='<tr class="'+rowCls+'">'
      +'<td><div class="tname"><div class="pbar '+pbarCls+'"></div><span class="tntext">'+t.n+'</span>'+urgTag+histTag+'</div></td>'
      +'<td><span class="badge bgr">'+t.cat+'</span></td>'
      +'<td>'+paisLabel+'</td>'
      +'<td style="'+regColor+'">'+(t.reg||'&#x2014;')+'</td>'
      +'<td style="'+hisColor+'">'+(t.hist||'&#x2014;')+'</td>'
      +'<td><span class="badge '+estBadge+'">'+t.est+'</span></td>'
      +'<td><div class="acts">'+btnHtml+'</div></td>'
      +'</tr>';
  });
  tbody.innerHTML=rows;
  var legend=document.getElementById('tlegend');
  if(legend)legend.innerHTML='<div class="li"><span class="rtag">Regular</span> Fondo estandar</div><div class="li"><span class="htag">Historica</span> Borde dorado</div>';
}

<script>

var SGN = {
  client: window.supabase.createClient(

var PAIS_NOMBRE = {CO:'Colombia',CL:'Chile',EC:'Ecuador',MX:'Mexico',GT:'Guatemala',PA:'Panama',PE:'Peru'};

function sgnInitials(name){
  return String(name||'?').trim().split(/\s+/).slice(0,2).map(function(p){return (p[0]||'').toUpperCase();}).join('');
}
function sgnEsc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// ── CARGA DE DATOS ──
async function sgnLoadData(){
  var r1 = await SGN.client.from('stores').select('*').order('store_name').limit(2000);
  var r2 = await SGN.client.from('novedades').select('*').neq('estado_local','cerrada_broker').limit(5000);
  if(!r1.error) SGN.stores = r1.data || [];
  if(!r2.error) SGN.novedades = r2.data || [];
  sgnBuildTiendas();
}
function sgnBuildTiendas(){
  var agg = {};
  SGN.novedades.forEach(function(n){
    var k = n.store_id;
    if(!agg[k]) agg[k] = {reg:0, cas:0};
    if(n.estado_local==='pendiente' || n.estado_local==='en_revision') agg[k].reg++;
    if(n.estado_local==='cas_abierto') agg[k].cas++;
  });
  TIENDAS = SGN.stores.map(function(s){
    var a = agg[s.id] || {reg:0,cas:0};
    return {id:s.id, n:s.store_name, cat:s.category||'—', pais:s.country,
      pregpais:PAIS_NOMBRE[s.country]||s.country, reg:a.reg, hist:0, cas:a.cas,
      est:s.urgente?'Urgente':(a.reg>0?'Pendiente':'Al dia'), urg:!!s.urgente, hist2:!!s.historicas};
  });
  TIENDAS.sort(function(a,b){return (b.urg?1:0)-(a.urg?1:0) || b.reg-a.reg;});
}

// ── AUTENTICACIÓN REAL ──
setRole = function(r){['ag','sup'].forEach(function(x){var e=document.getElementById('r'+x);if(e)e.classList.toggle('act',x===r);});};
doLogin = async function(){

  if(!email||!pass){alert('Ingresa tu correo y contrasena.');return;}

  if(res.error){alert('No se pudo iniciar sesion: '+res.error.message);return;}
  await sgnEnter(res.data.user);
};
async function sgnEnter(user){
  var pr = await SGN.client.from('profiles').select('*').eq('id',user.id).single();
  if(pr.error||!pr.data||!pr.data.active){alert('Tu usuario no esta activo en el SGN. Contacta al supervisor.');await SGN.client.auth.signOut();return;}

};

// ── TIENDAS: botones reales ──
function goTienda(id){SGN.curStoreId=id;goPage('td');}
filterTiendas = function(){
  var buscar=(document.getElementById('tf-buscar')?document.getElementById('tf-buscar').value:'').toLowerCase();
  var estado=document.getElementById('tf-estado')?document.getElementById('tf-estado').value:'';
  var tipo=document.getElementById('tf-tipo')?document.getElementById('tf-tipo').value:'';
  var pais=document.getElementById('tf-pais')?document.getElementById('tf-pais').value:'';
  var isAg=role==='ag';
  var filtered=TIENDAS.filter(function(t){
    if(buscar&&t.n.toLowerCase().indexOf(buscar)===-1)return false;
    if(estado==='Urgente'&&!t.urg)return false;
    if(estado==='Pendiente'&&t.est!=='Pendiente')return false;
    if(estado==='Al dia'&&t.est!=='Al dia')return false;
    if(tipo==='reg'&&!t.reg)return false;
    if(tipo==='hist'&&!t.hist2)return false;
    if(pais&&t.pais!==pais)return false;
    return true;
  });
  var stats=document.getElementById('tstats');
  var novsbar=document.getElementById('tnovsbar');
  if(stats){
    var totalReg=filtered.reduce(function(s,t){return s+(t.reg||0);},0);
    var totalHist=filtered.reduce(function(s,t){return s+(t.hist||0);},0);
    var totalCas=filtered.reduce(function(s,t){return s+(t.cas||0);},0);
    var totalNov=totalReg+totalHist+totalCas;
    var nUrg=filtered.filter(function(t){return t.urg;}).length;
    var nPen=filtered.filter(function(t){return t.est==='Pendiente';}).length;
    var nH2=filtered.filter(function(t){return t.hist2;}).length;
    var nAlDia=filtered.filter(function(t){return t.est==='Al dia';}).length;
    var hayFiltro=pais||estado||tipo||buscar;
    var filLabel=filtered.length<TIENDAS.length?' <span style="font-size:10px;color:var(--t3)">de '+TIENDAS.length+'</span>':'';
    stats.innerHTML=
      '<div class="sc" style="border-top:2px solid var(--navy)"><div class="sn">'+filtered.length+filLabel+'</div><div class="sl">Tiendas'+(hayFiltro?' (filtradas)':' activas')+'</div></div>'
      +'<div class="sc" style="border-top:2px solid var(--red)"><div class="sn" style="color:var(--red)">'+nUrg+'</div><div class="sl">Urgentes</div></div>'
      +'<div class="sc" style="border-top:2px solid var(--amb)"><div class="sn" style="color:var(--amb)">'+nPen+'</div><div class="sl">Con pendientes</div></div>'
      +'<div class="sc" style="border-top:2px solid var(--gold)"><div class="sn" style="color:var(--gold)">'+nH2+'</div><div class="sl">Con historicas</div></div>'
      +'<div class="sc" style="border-top:2px solid var(--grn)"><div class="sn" style="color:var(--grn)">'+nAlDia+'</div><div class="sl">Al dia</div></div>';
    if(novsbar){
      novsbar.innerHTML=
        '<span style="font-size:12px;color:var(--navy);font-weight:600">Novedades pendientes</span>'
        +'<span style="font-size:12.5px;color:var(--t2)">Pendientes: <strong style="color:var(--navy)">'+totalReg+'</strong></span>'
        +'<span style="font-size:12.5px;color:var(--t2)">CAS abiertos: <strong style="color:var(--red)">'+totalCas+'</strong></span>'
        +'<span style="margin-left:auto;background:var(--navy);color:#fff;font-size:12px;font-weight:600;padding:4px 14px;border-radius:20px">Total: '+totalNov+'</span>';
    }
  }
  var tbody=document.getElementById('ttbody');
  if(!tbody)return;
  if(filtered.length===0){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:28px;color:var(--t3);font-size:13px">No hay tiendas que coincidan con los filtros.</td></tr>';return;}
  var rows='';
  filtered.forEach(function(t){
    var rowCls=t.urg?'ru':t.hist2?'rh':'';
    var pbarCls=t.urg?'pbn':t.hist2?'pbg':'pbgn';
    var urgTag=t.urg?'<span class="utag">&#x1F6A9; Urgente</span>':'';
    var histTag=(t.hist2&&!t.urg)?'<span class="htag">&#x1F550; Historica</span>':'';
    var regColor=t.reg>0?'color:var(--red);font-weight:600':'color:var(--t3)';
    var estBadge=t.est==='Urgente'?'br':t.est==='Pendiente'?'bg':'bgn';
    var paisLabel=PAISES[t.pais]||t.pregpais||t.pais;
    var btnHtml='<button class="btn bp bsm" onclick="goTienda('+t.id+')">Gestionar</button>';
    if(!isAg){
      var urgBtn=t.urg
        ?'<button class="btn bsm" onclick="sgnSMo(\'qu\','+t.id+')">Quitar urg.</button>'
        :'<button class="btn br2 bsm" onclick="sgnSMo(\'mu\','+t.id+')">Urgente</button>';
      btnHtml=urgBtn+btnHtml;
    }
    rows+='<tr class="'+rowCls+'">'
      +'<td><div class="tname"><div class="pbar '+pbarCls+'"></div><span class="tntext">'+sgnEsc(t.n)+'</span>'+urgTag+histTag+'</div></td>'
      +'<td><span class="badge bgr">'+sgnEsc(t.cat)+'</span></td>'
      +'<td>'+paisLabel+'</td>'
      +'<td style="'+regColor+'">'+(t.reg||'&#x2014;')+'</td>'
      +'<td style="color:var(--t3)">&#x2014;</td>'
      +'<td><span class="badge '+estBadge+'">'+t.est+'</span></td>'
      +'<td><div class="acts">'+btnHtml+'</div></td>'
      +'</tr>';
  });
  tbody.innerHTML=rows;
  var legend=document.getElementById('tlegend');
  if(legend)legend.innerHTML='<div class="li">Datos sincronizados desde Dropi cada 10 minutos.</div>';
};

// ── ACCIONES DE SUPERVISOR (urgente on/off, real) ──
function sgnSMo(tp,id){
  var st=null;SGN.stores.forEach(function(s){if(s.id===id)st=s;});
  if(!st)return;
  var nm=sgnEsc(st.store_name);
  var cfg={
    mu:{t:'Marcar urgente — '+nm,b:'<div class="al ag">Esta tienda aparecera marcada como urgente para todos los agentes.</div>',btn:'Marcar urgente',bc:'br2'},
    qu:{t:'Quitar urgencia — '+nm,b:'<div class="al an">La tienda volvera a ordenarse normalmente.</div>',btn:'Quitar urgencia',bc:'bp'}
  };
  var c=cfg[tp];if(!c)return;
  document.getElementById('mosc').innerHTML='<div class="mh"><div class="mt">'+c.t+'</div><button class="mc" onclick="closeMo(\'mos\')">&#xD7;</button></div><div class="mb">'+c.b+'</div><div class="mf"><button class="btn bsm" onclick="closeMo(\'mos\')">Cancelar</button><button class="btn '+c.bc+' bsm" onclick="sgnSMoOk(\''+tp+'\','+id+')">'+c.btn+'</button></div>';
  document.getElementById('mos').classList.add('open');
}
async function sgnSMoOk(tp,id){
  var upd=tp==='mu'?{urgente:true}:{urgente:false};
  var r=await SGN.client.from('stores').update(upd).eq('id',id);
  if(r.error){alert('Error: '+r.error.message);return;}
  SGN.stores.forEach(function(s){if(s.id===id)s.urgente=upd.urgente;});

  if(curPg==='tiendas')sgnRenderBase('tiendas');
}

// ── DETALLE DE TIENDA (novedades reales) ──
function sgnRenderTd(){
  var el=document.getElementById('ptd');if(!el)return;
  var t=null;TIENDAS.forEach(function(x){if(x.id===SGN.curStoreId)t=x;});
  if(!t){el.innerHTML='<div class="pt">Detalle de tienda</div><div class="ps">Selecciona una tienda desde el modulo Tiendas.</div>';return;}
  var novsAll=SGN.novedades.filter(function(n){return n.store_id===t.id;});
  var nPend=0,nRev=0,nCas=0,nRes=0;
  novsAll.forEach(function(n){
    if(n.estado_local==='pendiente')nPend++;
    else if(n.estado_local==='en_revision')nRev++;
    else if(n.estado_local==='cas_abierto')nCas++;
    else if(n.estado_local==='resuelta')nRes++;
  });
  // Filtros (solo afectan la tabla; las tarjetas de arriba muestran el total de la tienda)
  var novs=novsAll.slice();
  var ageF=SGN.tdAge||'';
  if(ageF){novs=novs.filter(function(n){if(!n.broker_created_at)return false;var d=Math.floor((Date.now()-new Date(n.broker_created_at).getTime())/864e5);if(ageF==='v')return d<2;if(ageF==='a')return d>=2&&d<7;if(ageF==='r')return d>=7;return true;});}
  var estF=SGN.tdEstado||'';
  if(estF){novs=novs.filter(function(n){return n.estado_local===estF;});}
  var fD=SGN.tdFDesde||'',fH=SGN.tdFHasta||'';
  if(fD||fH){novs=novs.filter(function(n){if(!n.broker_created_at)return false;var f=String(n.broker_created_at).slice(0,10);if(fD&&f<fD)return false;if(fH&&f>fH)return false;return true;});}
  var orden={pendiente:0,en_revision:1,cas_abierto:2,resuelta:3};
  novs.sort(function(a,b){
    var d=(orden[a.estado_local]||9)-(orden[b.estado_local]||9);
    if(d!==0)return d;
    return new Date(a.broker_created_at||0)-new Date(b.broker_created_at||0); // mismo estado: la mas antigua primero
  });
  function sgnSemaforo(n){
    if(!n.broker_created_at)return {col:'var(--t3)',dias:null};
    var dias=Math.floor((Date.now()-new Date(n.broker_created_at).getTime())/864e5);
    if(n.estado_local==='resuelta')return {col:'var(--t3)',dias:dias};
    if(dias>=7)return {col:'var(--red)',dias:dias};
    if(dias>=2)return {col:'var(--amb)',dias:dias};
    return {col:'var(--grn)',dias:dias};
  }
  var rows='';
  novs.forEach(function(n){
    var sf=sgnSemaforo(n);
    var fechaTxt=n.broker_created_at?new Date(n.broker_created_at).toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'2-digit'}):'—';
    var fechaCell='<td style="font-size:11.5px;white-space:nowrap"><span title="Antiguedad de la novedad" style="display:inline-block;width:9px;height:9px;border-radius:50%;background:'+sf.col+';margin-right:6px;vertical-align:middle"></span>'+fechaTxt+(sf.dias!==null?' <span style="color:var(--t3);font-size:10.5px">('+sf.dias+'d)</span>':'')+'</td>';
    var estLbl={pendiente:'Pendiente',en_revision:'En revision',cas_abierto:'CAS abierto',resuelta:'Gestionada'}[n.estado_local]||n.estado_local;
    var badge=n.estado_local==='pendiente'?'bg':n.estado_local==='en_revision'?'bn':n.estado_local==='cas_abierto'?'br':'bgn';
    var done=Math.min(3,n.intentos||0),dots='',i;
    for(i=0;i<done;i++)dots+='<div class="dot dtr"></div>';
    for(i=done;i<3;i++)dots+='<div class="dot dte"></div>';
    var accion=n.estado_local==='resuelta'
      ?'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--grn)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>'
      :'<button class="btn bp bsm" onclick="sgnGest(\''+sgnEsc(n.order_id)+'\')">Gestionar</button>';
    rows+='<tr>'
      +'<td style="font-family:monospace;font-size:12px;font-weight:700;color:var(--navy)">#'+sgnEsc(n.order_id)+'</td>'
      +'<td style="font-size:12.5px">'+sgnEsc(n.tipo_novedad)+'</td>'
      +fechaCell
      +'<td><div class="cc"><span class="cn">'+sgnEsc(n.client_name||'—')+'</span><span class="ctel">'+sgnEsc(n.phone||'')+'</span></div></td>'
      +'<td style="font-size:11.5px;color:var(--t2)">'+sgnEsc(n.direccion_actual||'—')+'</td>'
      +'<td><div class="dots">'+dots+'</div></td>'
      +'<td><span class="badge '+badge+'">'+estLbl+'</span>'+((n.assigned_to&&n.estado_local!=='resuelta')?'<div style="font-size:10px;font-weight:600;margin-top:3px;color:'+(n.assigned_to===SGN.profile.id?'var(--grn)':'var(--amb)')+'">🔒 '+(n.assigned_to===SGN.profile.id?'En gestion (tu)':'En gestion')+'</div>':'')+'</td>'
      +'<td>'+accion+'</td>'
      +'</tr>';
  });
  if(!rows)rows='<tr><td colspan="8" style="text-align:center;padding:28px;color:var(--t3);font-size:13px">Esta tienda no tiene novedades activas. &#x1F389;</td></tr>';
  el.innerHTML=
    '<div class="crumb"><a onclick="goPage(\'tiendas\')">&#x2190; Tiendas</a><span>/</span><span class="cur">'+sgnEsc(t.n)+'</span><span class="badge bn">'+(PAIS_NOMBRE[t.pais]||t.pais)+'</span>'+(t.urg?'<span class="utag">&#x1F6A9; Urgente</span>':'')+'</div>'
    +'<div class="sg"><div class="sc"><div class="sn">'+novs.length+'</div><div class="sl">Novedades activas</div></div>'
    +'<div class="sc" style="border-top:2px solid var(--amb)"><div class="sn" style="color:var(--amb)">'+nPend+'</div><div class="sl">Pendientes</div></div>'
    +'<div class="sc" style="border-top:2px solid var(--navy)"><div class="sn" style="color:var(--navy)">'+nRev+'</div><div class="sl">En revision</div></div>'
    +'<div class="sc" style="border-top:2px solid var(--grn)"><div class="sn" style="color:var(--grn)">'+nRes+'</div><div class="sl">Gestionadas</div></div></div>'
    +'<div class="card">'
    +'<div style="display:flex;gap:9px;align-items:center;flex-wrap:wrap;padding:11px 14px;border-bottom:1px solid var(--bdr)">'
    +'<span style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em">Filtros</span>'
    +'<select onchange="SGN.tdEstado=this.value;sgnRenderTd()" style="font-size:11.5px;padding:5px 9px;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--sur);color:var(--tx);font-family:inherit">'+['','pendiente','resuelta','en_revision','cas_abierto'].map(function(o){var lbl={"":"Estado: todos","pendiente":"Pendiente","resuelta":"Gestionada","en_revision":"En revision","cas_abierto":"CAS"}[o];return '<option value="'+o+'"'+((SGN.tdEstado||'')===o?' selected':'')+'>'+lbl+'</option>';}).join('')+'</select>'
    +'<label style="font-size:11px;color:var(--t2)">Fecha orden:</label>'
    +'<input type="date" value="'+(SGN.tdFDesde||'')+'" onchange="SGN.tdFDesde=this.value;sgnRenderTd()" style="font-size:11.5px;padding:4px 8px;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--sur);color:var(--tx);font-family:inherit">'
    +'<span style="font-size:11px;color:var(--t3)">a</span>'
    +'<input type="date" value="'+(SGN.tdFHasta||'')+'" onchange="SGN.tdFHasta=this.value;sgnRenderTd()" style="font-size:11.5px;padding:4px 8px;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--sur);color:var(--tx);font-family:inherit">'

// ── GESTIÓN (modal con datos reales + guardado real) ──
function sgnGest(orderId){
  var n=null;SGN.novedades.forEach(function(x){if(x.order_id===orderId)n=x;});
  if(!n)return;
  SGN.curOrd=n;
  var inp=Math.min(3,(n.intentos||0)+1);
  openGest(n.order_id,(n.tipo_novedad||'').replace(/'/g,''),n.client_name||'—',n.phone||'',PAIS_NOMBRE[n.country]||n.country||'','Regular',inp);
  sgnHistorial(n.order_id);
}
// Clasifica una gestion como solucion Dropi o registro interno (sin tocar el esquema).
function sgnCanal(g){
  var sp=g.solution_payload;
  if(sp&&sp.tipo_solucion){
    var tipo=sp.tipo_solucion==='volver_a_ofrecer'?'Volver a ofrecer':sp.tipo_solucion==='return'?'Return':'Dropi';
    var estado=g.resolved_in_dropi===true?'aplicada':g.resolved_in_dropi===false?'rechazada':'registrada';
    return {canal:'Dropi',tipo:tipo,estado:estado};
  }
  return {canal:'Interno',tipo:'Registro interno',estado:''};
}
function sgnCanalBadge(g){
  var c=sgnCanal(g);
  if(c.canal==='Dropi'){
    var col=c.estado==='aplicada'?'var(--grn)':c.estado==='rechazada'?'var(--red)':'var(--navy)';
    var bg=c.estado==='aplicada'?'var(--grnl)':c.estado==='rechazada'?'var(--redl)':'var(--navyl)';
    var suf=c.estado==='aplicada'?'':' · '+c.estado;
    return '<span style="display:inline-block;font-size:9.5px;font-weight:700;color:'+col+';background:'+bg+';border-radius:20px;padding:1px 8px;margin-top:3px">&#x1F7E2; Dropi · '+c.tipo+suf+'</span>';
  }
  return '<span style="display:inline-block;font-size:9.5px;font-weight:700;color:var(--t2);background:var(--sur2);border-radius:20px;padding:1px 8px;margin-top:3px">&#x26AA; Interno</span>';
}
async function sgnHistorial(orderId){
  var r=await SGN.client.from('gestiones')
    .select('accion,comentario,nota_revision,motivo_devolucion,solucion_dropi,solution_payload,resolved_in_dropi,created_at,profiles(full_name)')
    .eq('order_id',orderId).order('created_at',{ascending:false}).limit(10);
  var target=null;
  document.querySelectorAll('#mogc .mb > div').forEach(function(d){
    if(d.textContent.indexOf('Historial de gestiones')===0)target=d;
  });
  if(!target)return;
  var lbl='<div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px">Historial de gestiones</div>';
  if(r.error||!r.data||!r.data.length){
    target.innerHTML=lbl+'<p style="font-size:12px;color:var(--t3);font-style:italic">Sin gestiones anteriores.</p>';return;
  }
  var nombres={contacto:'Contacto con cliente',sin_contacto:'Sin contacto',en_revision:'En revision',devolucion:'Devolucion al remitente',cas:'CAS abierto',transportadora:'Solucionada por transportadora'};
  var items='';
  r.data.forEach(function(g){
    var detalle=g.solucion_dropi||g.comentario||g.nota_revision||g.motivo_devolucion||'';
    var quien=(g.profiles&&g.profiles.full_name)?g.profiles.full_name:'—';
    var f=new Date(g.created_at).toLocaleString('es-CO',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
    items+='<div style="display:flex;gap:8px;padding:7px 0"><div style="width:7px;height:7px;border-radius:50%;background:var(--gold);margin-top:5px;flex-shrink:0"></div><div><div style="font-size:12.5px;font-weight:500;color:var(--tx)">'+(nombres[g.accion]||g.accion)+'</div>'+(detalle?'<div style="font-size:12px;color:var(--t2);font-style:italic;margin-top:1px">'+sgnEsc(detalle)+'</div>':'')+'<div style="font-size:10.5px;color:var(--t3);margin-top:2px">'+sgnEsc(quien)+' · '+f+'</div>'+sgnCanalBadge(g)+'</div></div>';
  });
  target.innerHTML=lbl+items;
}

guardar = async function(){
  if(!SGN.curOrd||!gAc)return;
  var n=SGN.curOrd;
  var acMap={ok:'contacto',no:'sin_contacto',rev:'en_revision',dev:'devolucion',cas:'cas'};
  var comentario=null,nota=null,motivo=null;
  if(gAc==='ok')comentario=document.getElementById('cm-ok').value.trim();
  if(gAc==='no')comentario=document.getElementById('cm-no').value.trim();
  if(gAc==='cas')comentario=document.getElementById('cm-cas').value.trim();
  if(gAc==='rev')nota=['Cliente aun no define fecha de entrega','Falta un dato de direccion','Se espera respuesta del dropshipper'][gNt-1]||null;
  if(gAc==='dev')motivo=document.getElementById('gmot').value;
  var b=document.getElementById('bguard');
  if(b){b.disabled=true;b.textContent='Guardando...';}
  var g=await SGN.client.from('gestiones').insert({
    order_id:n.order_id,store_name:n.store_name,agente_id:SGN.profile.id,
    accion:acMap[gAc],comentario:comentario,nota_revision:nota,motivo_devolucion:motivo,
    variante:n.variante,resolved_in_dropi:null
  });
  if(g.error){
    alert('Error al guardar la gestion: '+g.error.message);
    if(b){b.disabled=false;b.innerHTML='&#x2713; Guardar gestion';}
    return;
  }
  var nuevo=gAc==='rev'?'en_revision':gAc==='cas'?'cas_abierto':(gAc==='ok'||gAc==='dev')?'resuelta':'pendiente';
  await SGN.client.from('novedades').update({intentos:(n.intentos||0)+1,estado_local:nuevo,assigned_to:null}).eq('order_id',n.order_id);
  n.intentos=(n.intentos||0)+1;n.estado_local=nuevo;
  sgnBuildTiendas();
  closeMo('mog');setTimeout(function(){goPage('conf');},200);
};

selTr = async function(){
  if(!SGN.curOrd)return;
  if(!confirm('⚠️ Reconfirma: ¿esta novedad fue SOLUCIONADA POR LA TRANSPORTADORA?\n\nAl aceptar se marcará como RESUELTA en el sistema. Esta accion no se deshace.\n\nCancela si no estas seguro.'))return;
  var n=SGN.curOrd;
  await SGN.client.from('gestiones').insert({order_id:n.order_id,store_name:n.store_name,agente_id:SGN.profile.id,accion:'transportadora'});
  await SGN.client.from('novedades').update({estado_local:'resuelta',intentos:(n.intentos||0)+1,assigned_to:null}).eq('order_id',n.order_id);
  n.estado_local='resuelta';n.intentos=(n.intentos||0)+1;
  sgnBuildTiendas();
  closeMo('mog');setTimeout(function(){goPage('conf');},200);
};

// ── MI RENDIMIENTO (placeholder v1; v2 lo redefine con metas por dia) ──
async function sgnRenderRend(){
  var el=document.getElementById('prend');
  if(el)el.innerHTML='<div class="pt">Mi rendimiento</div><div class="ps">Cargando...</div>';
}
setRnd = function(btn,p){
  if(!SGN.rendData)return;
  document.querySelectorAll('#prend .qb').forEach(function(b){b.classList.remove('act');});
  if(btn)btn.classList.add('act');
  var d=SGN.rendData[p],c=d.c,meta=d.meta;
  var pct=meta?Math.round(c.tot/meta*100):0;
  var falta=Math.max(0,meta-c.tot);
  function u(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}
  u('rn',c.tot.toLocaleString('es-CO'));u('rd','de '+meta.toLocaleString('es-CO'));
  u('rt',pct>=100?'Meta superada!':falta>0?'Te faltan '+falta.toLocaleString('es-CO'):'');
  u('rs','Meta: '+meta.toLocaleString('es-CO')+' · '+pct+'%');
  u('r1',c.ok);u('r2',c.no);u('r3',c.dev);u('r4',c.cas);
  var b=document.getElementById('rb');if(b)b.style.width=Math.min(pct,100)+'%';
  var rc=document.getElementById('rc');if(rc)rc.style.strokeDashoffset=226.19*(1-Math.min(pct,100)/100*0.75);
};

      +'<td style="font-size:12px">'+sgnEsc(n.store_name)+'</td><td style="font-size:12px">'+sgnEsc(n.tipo_novedad||'')+'</td>'
      +'<td><span class="badge '+badge+'">'+estLbl+'</span></td>'
      +'<td><div class="acts"><button class="btn bp bsm" onclick="sgnVerOrden(\''+sgnEsc(n.order_id)+'\')">Ver detalle</button></div></td></tr>';
  });
  res.innerHTML=html+'</tbody></table></div>';

updB = function(){
  var b=document.getElementById('bguard');if(!b)return;
  if(!gAc){b.disabled=true;return;}
  if(gAc==='ok'){b.disabled=!document.getElementById('sd-ok').value.trim();return;}
  if(gAc==='no'){b.disabled=!document.getElementById('cm-no').value.trim();return;}
  if(gAc==='rev'){b.disabled=!gNt;return;}
  if(gAc==='dev'){b.disabled=!(document.getElementById('gmot').value&&document.getElementById('sd-dev').value.trim());return;}
  if(gAc==='cas'){b.disabled=!document.getElementById('cm-cas').value.trim();return;}
  b.disabled=false;
};

guardar = async function(){
  if(!SGN.curOrd||!gAc)return;
  var n=SGN.curOrd;
  var acMap={ok:'contacto',no:'sin_contacto',rev:'en_revision',dev:'devolucion',cas:'cas'};
  var comentario=null,nota=null,motivo=null,solucion=null;
  if(gAc==='ok'){solucion=document.getElementById('sd-ok').value.trim();comentario=document.getElementById('cm-ok').value.trim()||null;}
  if(gAc==='no')comentario=document.getElementById('cm-no').value.trim();
  if(gAc==='cas')comentario=document.getElementById('cm-cas').value.trim();
  if(gAc==='rev')nota=['Cliente aun no define fecha de entrega','Falta un dato de direccion','Se espera respuesta del dropshipper'][gNt-1]||null;
  if(gAc==='dev'){motivo=document.getElementById('gmot').value;solucion=document.getElementById('sd-dev').value.trim();}
  var b=document.getElementById('bguard');
  if(b){b.disabled=true;b.textContent='Guardando...';}

  var resolved=null;
  if(SGN.resolveEnDropi&&(gAc==='ok'||gAc==='dev')){
    resolved=await sgnFn('resolve-novedad',{
      order_id:n.order_id,variante:n.variante||'C',
      solution_text:solucion||'',
      solution_payload:{solution:solucion||'',direccionConfirma:n.direccion_corregida||n.direccion_actual||''}
    });
    if(!(resolved&&resolved.ok)){
      alert('No se pudo aplicar la resolucion en Dropi: '+((resolved&&resolved.error)||'error')+'. La gestion quedara registrada igualmente.');
    }
  }

  var g=await SGN.client.from('gestiones').insert({
    order_id:n.order_id,store_name:n.store_name,agente_id:SGN.profile.id,
    accion:acMap[gAc],comentario:comentario,nota_revision:nota,motivo_devolucion:motivo,
    solucion_dropi:solucion,variante:n.variante,resolved_in_dropi:resolved?!!resolved.ok:null
  });
  if(g.error){
    alert('Error al guardar la gestion: '+g.error.message);
    if(b){b.disabled=false;b.innerHTML='&#x2713; Guardar gestion';}
    return;
  }
  var nuevo=gAc==='rev'?'en_revision':gAc==='cas'?'cas_abierto':(gAc==='ok'||gAc==='dev')?'resuelta':'pendiente';
  await SGN.client.from('novedades').update({intentos:(n.intentos||0)+1,estado_local:nuevo,assigned_to:null}).eq('order_id',n.order_id);
  n.intentos=(n.intentos||0)+1;n.estado_local=nuevo;
  sgnBuildTiendas();
  closeMo('mog');setTimeout(function(){goPage('conf');},200);
};

  var tbody=aj3.querySelector('table tbody');if(!tbody)return;

    if(sels[0]){rolF=sels[0].value;sels[0].onchange=function(){sgnRenderUsuarios();};}
    if(sels[1]){estF=sels[1].value;sels[1].onchange=function(){sgnRenderUsuarios();};}
  }
  var list=SGN.users.filter(function(u){
    if(q&&(u.full_name||'').toLowerCase().indexOf(q)===-1&&(u.email||'').toLowerCase().indexOf(q)===-1)return false;
    if(rolF==='Agente'&&u.role!=='agente')return false;
    if(rolF==='Supervisor'&&u.role!=='supervisor'&&u.role!=='admin')return false;
    if(estF==='Activo'&&!u.active)return false;

  });

    var metas=Array.isArray(u.metas_dia)?u.metas_dia:[280,280,280,280,280,150,0];

      ? metas.slice(0,6).map(function(v,i){return i===5?'<span style="color:var(--gold)">'+v+'</span>':String(v);}).join(' ')

    var edBtn=sgnPuedeGestionar(u)
      ?'<button class="btn bgn2 bsm" onclick="sgnUserEdit(\''+u.id+'\')">Editar</button>'
      :'<button class="btn bgn2 bsm" disabled style="opacity:.4;cursor:not-allowed" title="Solo el admin puede editar supervisores">Editar</button>';
    var delBtn=sgnPuedeEliminar(u)
      ?'<button class="btn br2 bsm" onclick="sgnUserDel(\''+u.id+'\')">Eliminar</button>'
      :'<button class="btn br2 bsm" disabled style="opacity:.4;cursor:not-allowed" title="'+(u.id===SGN.profile.id?'No puedes eliminarte a ti mismo':'Solo el admin puede eliminar supervisores')+'">Eliminar</button>';
    rows+='<tr style="'+(u.active?'':'opacity:.5')+'">'
      +'<td><div style="display:flex;align-items:center;gap:8px"><div class="av '+(u.role==='agente'?'avn':'avg')+'">'+sgnInitials(u.full_name)+'</div>'
      +'<div><div style="font-size:13px;font-weight:500;color:var(--tx)">'+sgnEsc(u.full_name)+'</div>'
      +'<div style="font-size:11px;color:var(--t3)">'+sgnEsc(u.email)+'</div></div></div></td>'
      +'<td>'+sgnRolBadge(u.role)+'</td>'
      +'<td><span class="badge '+(u.active?'bgn':'bgr')+'">'+(u.active?'Activo':'Inactivo')+'</span></td>'
      +'<td style="font-family:monospace;font-size:12px">'+metaCell+'</td>'
      +'<td style="font-size:12.5px;color:var(--t2)">'+f+'</td>'
      +'<td><div class="acts">'+edBtn+delBtn+'</div></td></tr>';
  });
  tbody.innerHTML=rows||'<tr><td colspan="6" style="text-align:center;padding:22px;color:var(--t3);font-size:13px">No hay usuarios que coincidan.</td></tr>';
  var checks=document.getElementById('masiva-checks');
  if(checks&&!checks.getAttribute('data-real')){
    checks.setAttribute('data-real','1');
    var ags=SGN.users.filter(function(u){return u.role==='agente'&&u.active;});
    checks.innerHTML=ags.map(function(a){
      return '<label style="display:flex;align-items:center;gap:9px;padding:9px 13px;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--sur);cursor:pointer">'
        +'<input type="checkbox" checked class="ag-check" data-id="'+a.id+'" style="accent-color:var(--navy);width:15px;height:15px">'
        +'<div class="av avn" style="width:24px;height:24px;font-size:9px">'+sgnInitials(a.full_name)+'</div>'
        +'<span style="font-size:13px;font-weight:500;color:var(--tx)">'+sgnEsc(a.full_name)+'</span></label>';
    }).join('')||'<div style="font-size:12px;color:var(--t3)">No hay agentes activos aun.</div>';
  }
  if(SGN.profile.role!=='admin'){
    aj3.querySelectorAll('button').forEach(function(b){
      if(b.textContent.indexOf('Nuevo supervisor')!==-1){b.disabled=true;b.style.opacity='.4';b.style.cursor='not-allowed';b.title='Solo el admin puede crear supervisores';}

sgnRenderRend = async function(){
  var el=document.getElementById('prend');if(!el)return;
  el.innerHTML='<div class="pt">Mi rendimiento</div><div class="ps">Cargando tus metricas...</div>';
  var metas=Array.isArray(SGN.profile.metas_dia)?SGN.profile.metas_dia:[280,280,280,280,280,150,0];
  var now=new Date(),d0=new Date(now);d0.setHours(0,0,0,0);
  var monday=new Date(d0);monday.setDate(d0.getDate()-((d0.getDay()+6)%7));
  var m0=new Date(now.getFullYear(),now.getMonth(),1);
  var s7=new Date(d0);s7.setDate(d0.getDate()-6);
  var from=new Date(Math.min(m0.getTime(),monday.getTime(),s7.getTime())).toISOString();
  var r=await SGN.client.from('gestiones').select('accion,created_at').eq('agente_id',SGN.profile.id).gte('created_at',from).limit(10000);
  var rows=r.data||[];
  function agg(f){var c={tot:0,ok:0,no:0,dev:0,cas:0};rows.forEach(function(g){if(new Date(g.created_at)>=f){c.tot++;if(g.accion==='contacto')c.ok++;else if(g.accion==='sin_contacto')c.no++;else if(g.accion==='devolucion')c.dev++;else if(g.accion==='cas')c.cas++;}});return c;}
  var metaSem=metas.reduce(function(a,b){return a+(b||0);},0);
  var metaHoy=metas[(d0.getDay()+6)%7]||0;
  SGN.rendData={h:{c:agg(d0),meta:metaHoy},s:{c:agg(monday),meta:metaSem},m:{c:agg(m0),meta:Math.round(metaSem*4.33)}};
  var days=[],i;for(i=6;i>=0;i--){var d=new Date(d0);d.setDate(d0.getDate()-i);days.push(d);}
  var series=days.map(function(d){
    var d2=new Date(d);d2.setDate(d.getDate()+1);
    var v=0;rows.forEach(function(g){var t=new Date(g.created_at);if(t>=d&&t<d2)v++;});
    return {d:isTd(d)?'Hoy':dws(d),v:v,m:metas[(d.getDay()+6)%7]||0,isH:isTd(d)};
  });
  var mx=1;series.forEach(function(x){if(x.v>mx)mx=x.v;if(x.m>mx)mx=x.m;});
  var chart=series.map(function(it){
    var col=it.isH?'var(--t3)':it.m===0?'var(--t3)':it.v>it.m?'var(--gold)':it.v>=it.m*0.8?'var(--grn)':'var(--red)';
    var h=Math.max(3,Math.round(it.v/mx*40));
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:3px"><span style="font-size:12px;font-weight:600;color:'+col+'">'+it.v+'</span><div style="width:24px;height:'+h+'px;border-radius:3px;background:'+col+'"></div><span style="font-size:10.5px;color:var(--t3)">'+it.d+'</span></div>';
  }).join('');
  el.innerHTML=
    '<div class="pt">Mi rendimiento</div><div class="ps">Progreso de gestiones &#x2014; '+sgnEsc(SGN.profile.full_name)+'</div>'
    +'<div style="display:flex;gap:6px;margin-bottom:16px"><button class="qb act" onclick="setRnd(this,\'h\')">Hoy</button><button class="qb" onclick="setRnd(this,\'s\')">Esta semana</button><button class="qb" onclick="setRnd(this,\'m\')">Este mes</button></div>'
    +'<div class="tc" style="margin-bottom:16px">'
    +'<div class="card cb" style="display:flex;align-items:center;gap:18px">'
    +'<div style="position:relative;width:84px;height:84px;flex-shrink:0">'
    +'<svg width="84" height="84" viewBox="0 0 84 84" style="transform:rotate(-90deg)"><circle cx="42" cy="42" r="36" fill="none" stroke="var(--sur2)" stroke-width="6"/><circle cx="42" cy="42" r="36" fill="none" stroke="var(--grn)" stroke-width="6" stroke-dasharray="226.19" stroke-dashoffset="226.19" stroke-linecap="round" id="rc"/></svg>'
    +'<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><div style="font-size:19px;font-weight:700;color:var(--tx)" id="rn">0</div><div style="font-size:9.5px;color:var(--t3)" id="rd"></div></div></div>'
    +'<div style="flex:1"><div style="font-size:13.5px;font-weight:600;color:var(--tx);margin-bottom:3px" id="rt"></div><div style="font-size:12px;color:var(--t2);margin-bottom:8px" id="rs"></div><div class="pb"><div class="pf" style="width:0%;background:var(--grn)" id="rb"></div></div></div>'
    +'</div>'
    +'<div class="card cb"><div style="display:grid;grid-template-columns:1fr 1fr;gap:0">'
    +'<div style="padding:11px;border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr)"><div style="font-size:10.5px;color:var(--t3);margin-bottom:3px">Con contacto</div><div style="font-size:21px;font-weight:700;color:var(--navy)" id="r1">0</div></div>'
    +'<div style="padding:11px;border-bottom:1px solid var(--bdr)"><div style="font-size:10.5px;color:var(--t3);margin-bottom:3px">Sin contacto</div><div style="font-size:21px;font-weight:700;color:var(--gold)" id="r2">0</div></div>'
    +'<div style="padding:11px;border-right:1px solid var(--bdr)"><div style="font-size:10.5px;color:var(--t3);margin-bottom:3px">Devoluciones</div><div style="font-size:21px;font-weight:700;color:var(--red)" id="r3">0</div></div>'
    +'<div style="padding:11px"><div style="font-size:10.5px;color:var(--t3);margin-bottom:3px">CAS abiertos</div><div style="font-size:21px;font-weight:700;color:var(--navy)" id="r4">0</div></div>'
    +'</div></div></div>'
    +'<div class="card cb"><div style="font-size:13px;font-weight:600;color:var(--tx);margin-bottom:13px;padding-bottom:9px;border-bottom:1px solid var(--bdr)">Ultimos 7 dias</div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:7px">'+chart+'</div>'
    +'<div style="display:flex;gap:12px;margin-top:11px;flex-wrap:wrap">'
    +'<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t2)"><div style="width:8px;height:8px;border-radius:2px;background:var(--gold)"></div>Supero meta</div>'
    +'<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t2)"><div style="width:8px;height:8px;border-radius:2px;background:var(--grn)"></div>Meta cumplida</div>'
    +'<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t2)"><div style="width:8px;height:8px;border-radius:2px;background:var(--red)"></div>Sin meta</div>'
    +'</div></div>';
  setRnd(document.querySelector('#prend .qb'),'h');
};

</script>
<script>
// ════════════════════════════════════════════════════════════
// SGN · V3: resolucion real en Dropi, campos Dropi, metricas de
// tienda con comentarios especiales, seguridad de cuentas,
// landing "Mi rendimiento" para agentes.
// ════════════════════════════════════════════════════════════
SGN.resolveEnDropi = true; // ★ ACTIVADO: contacto/devolucion se aplican en Dropi
SGN.appUrl = 'https://karenmalagon-star.github.io/sgn/';
SGN.comments = [];
SGN.anlNovs = [];

// ── comentarios especiales por tienda ──
async function sgnLoadComments(){
  var r = await SGN.client.from('store_comments')
    .select('id,store_id,texto,activo,created_at,profiles(full_name)')
    .eq('activo',true).order('created_at',{ascending:false}).limit(500);
  if(!r.error) SGN.comments = r.data || [];
}
function sgnStoreComments(storeId){
  return SGN.comments.filter(function(c){return c.store_id===storeId&&c.activo;});
}

// ── login v3: landing por rol + cambio de contrasena obligatorio ──
sgnEnter = async function(user){
  var pr = await SGN.client.from('profiles').select('*').eq('id',user.id).single();
  if(pr.error||!pr.data||!pr.data.active){alert('Tu usuario no esta activo en el SGN. Contacta al supervisor.');await SGN.client.auth.signOut();return;}
  SGN.profile = pr.data;
  role = (pr.data.role==='supervisor'||pr.data.role==='admin') ? 'sup' : 'ag';
  await sgnLoadData();
  await sgnLoadComments();
  document.getElementById('lp').style.display='none';
  document.getElementById('ap').style.display='flex';
  var av=sgnInitials(pr.data.full_name);
  var rl=pr.data.role==='admin'?'Admin':pr.data.role==='supervisor'?'Supervisor':'Agente';
  ['sbav','tav'].forEach(function(id){var e=document.getElementById(id);if(e)e.textContent=av;});
  document.getElementById('sbname').textContent=pr.data.full_name;
  document.getElementById('sbrole').textContent=rl;
  document.getElementById('tname').textContent=pr.data.full_name;
  buildSB();
  goPage(role==='ag'?'rend':'tiendas');
  if(pr.data.must_change_password)sgnForcePass(true);
};

// ── cambio de contrasena (forzado o por recuperacion) ──
function sgnForcePass(obligatorio){
  document.getElementById('mosc').innerHTML=
    '<div class="mh"><div class="mt">Define tu contrasena</div>'+(obligatorio?'':'<button class="mc" onclick="closeMo(\'mos\')">&#xD7;</button>')+'</div>'
    +'<div class="mb">'
    +'<div class="al ag" style="font-size:12.5px">'+(obligatorio?'Por seguridad debes definir tu propia contrasena antes de continuar.':'Escribe tu nueva contrasena.')+'</div>'
    +'<div class="fld" style="margin-top:11px"><label>Nueva contrasena (minimo 8 caracteres)</label><input type="password" id="np1"></div>'
    +'<div class="fld" style="margin-top:9px"><label>Confirmala</label><input type="password" id="np2"></div>'
    +'<div id="np-err"></div>'
    +'</div>'
    +'<div class="mf"><button class="btn bp bsm" id="np-save" onclick="sgnSavePass()">Guardar contrasena</button></div>';
  document.getElementById('mos').classList.add('open');
}
async function sgnSavePass(){
  var p1=document.getElementById('np1').value,p2=document.getElementById('np2').value;
  var err=document.getElementById('np-err');
  if(p1.length<8){err.innerHTML='<div class="al ar" style="font-size:12px;margin-top:9px">Minimo 8 caracteres.</div>';return;}
  if(p1!==p2){err.innerHTML='<div class="al ar" style="font-size:12px;margin-top:9px">Las contrasenas no coinciden.</div>';return;}
  var b=document.getElementById('np-save');b.disabled=true;b.textContent='Guardando...';
  var r=await SGN.client.auth.updateUser({password:p1});
  if(r.error){err.innerHTML='<div class="al ar" style="font-size:12px;margin-top:9px">'+sgnEsc(r.error.message)+'</div>';b.disabled=false;b.textContent='Guardar contrasena';return;}
  await sgnFn('admin-users',{action:'password_changed'});
  if(SGN.profile)SGN.profile.must_change_password=false;
  closeMo('mos');
  alert('Contrasena actualizada correctamente.');
}

// ── recuperacion de contrasena ──
(function(){
  var spans=document.querySelectorAll('#lp span');
  spans.forEach(function(s){
    if(s.textContent.trim()==='Recuperar'){
      s.onclick=async function(){
        var email=prompt('Escribe tu correo y te enviaremos un enlace para recuperar la contrasena:');
        if(!email)return;
        var r=await SGN.client.auth.resetPasswordForEmail(email.trim(),{redirectTo:SGN.appUrl});
        alert(r.error?('Error: '+r.error.message):'Si el correo esta registrado, recibiras un enlace de recuperacion en unos minutos.');
      };
    }
  });
  SGN.client.auth.onAuthStateChange(function(event){
    if(event==='PASSWORD_RECOVERY'){setTimeout(function(){sgnForcePass(true);},600);}
  });
})();

// ── Productividad REAL (reemplaza el demo) ──
sgnRenderProd = async function(){
  var el=document.getElementById('pprod');if(!el)return;
  function iso(d){return d.toISOString().slice(0,10);}
  if(!SGN.prodDesde){SGN.prodHasta=iso(new Date());SGN.prodDesde=iso(new Date(Date.now()-6*864e5));}
  el.innerHTML='<div class="pt">Productividad</div><div class="ps">Rendimiento real del equipo (datos de gestiones)</div>'
    +'<div class="fb"><div class="fr"><label>Desde</label><input type="date" id="pr-desde" value="'+SGN.prodDesde+'"><label>Hasta</label><input type="date" id="pr-hasta" value="'+SGN.prodHasta+'"><button class="btn bp bsm" onclick="sgnProdConsultar()">Consultar</button></div></div>'
    +'<div id="pr-body"><p class="ps">Cargando metricas reales...</p></div>';
  var pr=await SGN.client.from('profiles').select('id,full_name,role,active,metas_dia').eq('role','agente');
  var agentes=(pr.data||[]).filter(function(a){return a.active!==false;});
  var g=await SGN.client.from('gestiones').select('agente_id,accion,created_at').gte('created_at',SGN.prodDesde+'T00:00:00').lte('created_at',SGN.prodHasta+'T23:59:59').limit(20000);
  var rows=g.data||[];
  var byAg={};
  agentes.forEach(function(a){byAg[a.id]={contacto:0,sin_contacto:0,devolucion:0,total:0};});
  rows.forEach(function(r){
    if(!byAg[r.agente_id])byAg[r.agente_id]={contacto:0,sin_contacto:0,devolucion:0,total:0};
    var b=byAg[r.agente_id];b.total++;
    if(r.accion==='contacto')b.contacto++;else if(r.accion==='sin_contacto')b.sin_contacto++;else if(r.accion==='devolucion')b.devolucion++;
  });
  function metaRango(metas){
    metas=Array.isArray(metas)?metas:[280,280,280,280,280,150,0];
    var t=0,dB=new Date(SGN.prodHasta+'T12:00:00');
    for(var d=new Date(SGN.prodDesde+'T12:00:00');d<=dB;d.setDate(d.getDate()+1)){t+=(metas[(d.getDay()+6)%7]||0);}
    return t;
  }
  var totalGest=0,enMeta=0,superaron=0,debajo=0,trs='';
  agentes.forEach(function(a){
    var c=byAg[a.id]||{contacto:0,sin_contacto:0,devolucion:0,total:0};
    var target=metaRango(a.metas_dia),pct=target?Math.round(c.total/target*100):0;
    totalGest+=c.total;
    if(pct>100)superaron++;else if(pct>=80)enMeta++;else debajo++;
    var col=pct>100?'var(--gold)':pct>=80?'var(--grn)':'var(--red)';
    trs+='<tr><td><div style="display:flex;align-items:center;gap:8px"><div class="av avn">'+sgnInitials(a.full_name||'?')+'</div><span style="font-size:12.5px;font-weight:500">'+sgnEsc(a.full_name||'—')+'</span></div></td>'
      +'<td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:6px;background:var(--sur2);border-radius:3px;overflow:hidden;max-width:150px"><div style="height:100%;width:'+Math.min(100,pct)+'%;background:'+col+'"></div></div><span style="font-size:12px;color:'+col+';font-weight:600">'+pct+'%</span></div></td>'
      +'<td>'+c.contacto+'</td><td>'+c.sin_contacto+'</td><td>'+c.devolucion+'</td><td><strong>'+c.total+'</strong></td></tr>';
  });
  if(!trs)trs='<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--t3);font-size:13px">No hay agentes activos o no hay gestiones en este periodo.</td></tr>';
  var body=document.getElementById('pr-body');if(!body)return;
  body.innerHTML=
    '<div class="sg" style="margin-bottom:16px"><div class="sc"><div class="sn">'+totalGest+'</div><div class="sl">Gestiones en periodo</div></div>'
    +'<div class="sc" style="border-top:2px solid var(--grn)"><div class="sn" style="color:var(--grn)">'+enMeta+'</div><div class="sl">En meta</div></div>'
    +'<div class="sc" style="border-top:2px solid var(--gold)"><div class="sn" style="color:var(--gold)">'+superaron+'</div><div class="sl">Superaron meta</div></div>'
    +'<div class="sc" style="border-top:2px solid var(--red)"><div class="sn" style="color:var(--red)">'+debajo+'</div><div class="sl">Por debajo</div></div></div>'
    +'<div class="card"><div class="tw"><table><thead><tr><th>Agente</th><th>Progreso</th><th>Contacto</th><th>Sin contacto</th><th>Devolucion</th><th>Total</th></tr></thead><tbody>'+trs+'</tbody></table></div></div>';
};
sgnProdConsultar = function(){
  var d=document.getElementById('pr-desde'),h=document.getElementById('pr-hasta');
  if(d&&d.value)SGN.prodDesde=d.value;if(h&&h.value)SGN.prodHasta=h.value;
  sgnRenderProd();
};

// ── router v3 ──
renderPg = function(pg){
  if(pg==='td'){sgnRenderTd();sgnTdComments();return;}
  if(pg==='rend'){sgnRenderRend();return;}
  if(pg==='anl'){sgnRenderAnl();return;}
  if(pg==='prod'){sgnRenderProd();return;}
  if(pg==='tiendas'){
    sgnRenderBase('tiendas');
    sgnInjectBusqueda();
    sgnLoadData().then(function(){if(curPg==='tiendas'){sgnRenderBase('tiendas');sgnInjectBusqueda();}});
    return;
  }
  if(pg==='ajustes'){sgnRenderBase('ajustes');sgnLoadUsuarios();return;}
  sgnRenderBase(pg);
};
function sgnTdComments(){
  var list=sgnStoreComments(SGN.curStoreId);
  if(!list.length)return;
  var el=document.getElementById('ptd');if(!el)return;
  var crumb=el.querySelector('.crumb');if(!crumb)return;
  var div=document.createElement('div');
  div.className='al ag';
  div.style.cssText='font-size:12.5px;margin-bottom:12px';
  div.innerHTML='&#x1F4CC; <strong>Notas especiales de la tienda:</strong> '+list.map(function(c){return sgnEsc(c.texto);}).join(' &middot; ');
  crumb.parentNode.insertBefore(div,crumb.nextSibling);
}

// ── tiendas: boton Analizar para supervisores/admin ──
function goAnl(id){SGN.curStoreId=id;goPage('anl');}
filterTiendas = function(){
  var buscar=(document.getElementById('tf-buscar')?document.getElementById('tf-buscar').value:'').toLowerCase();
  var estado=document.getElementById('tf-estado')?document.getElementById('tf-estado').value:'';
  var tipo=document.getElementById('tf-tipo')?document.getElementById('tf-tipo').value:'';
  var pais=document.getElementById('tf-pais')?document.getElementById('tf-pais').value:'';
  var isAg=role==='ag';
  var filtered=TIENDAS.filter(function(t){
    if(buscar&&t.n.toLowerCase().indexOf(buscar)===-1)return false;
    if(estado==='Urgente'&&!t.urg)return false;
    if(estado==='Pendiente'&&t.est!=='Pendiente')return false;
    if(estado==='Al dia'&&t.est!=='Al dia')return false;
    if(tipo==='reg'&&!t.reg)return false;
    if(tipo==='hist'&&!t.hist2)return false;
    if(pais&&t.pais!==pais)return false;
    return true;
  });
  var stats=document.getElementById('tstats');
  var novsbar=document.getElementById('tnovsbar');
  if(stats){
    var totalReg=filtered.reduce(function(s,t){return s+(t.reg||0);},0);
    var totalCas=filtered.reduce(function(s,t){return s+(t.cas||0);},0);
    var totalNov=totalReg+totalCas;
    var nUrg=filtered.filter(function(t){return t.urg;}).length;
    var nPen=filtered.filter(function(t){return t.est==='Pendiente';}).length;
    var nH2=filtered.filter(function(t){return t.hist2;}).length;
    var nAlDia=filtered.filter(function(t){return t.est==='Al dia';}).length;
    var hayFiltro=pais||estado||tipo||buscar;
    var filLabel=filtered.length<TIENDAS.length?' <span style="font-size:10px;color:var(--t3)">de '+TIENDAS.length+'</span>':'';
    stats.innerHTML=
      '<div class="sc" style="border-top:2px solid var(--navy)"><div class="sn">'+filtered.length+filLabel+'</div><div class="sl">Tiendas'+(hayFiltro?' (filtradas)':' activas')+'</div></div>'
      +'<div class="sc" style="border-top:2px solid var(--red)"><div class="sn" style="color:var(--red)">'+nUrg+'</div><div class="sl">Urgentes</div></div>'
      +'<div class="sc" style="border-top:2px solid var(--amb)"><div class="sn" style="color:var(--amb)">'+nPen+'</div><div class="sl">Con pendientes</div></div>'
      +'<div class="sc" style="border-top:2px solid var(--gold)"><div class="sn" style="color:var(--gold)">'+nH2+'</div><div class="sl">Con historicas</div></div>'
      +'<div class="sc" style="border-top:2px solid var(--grn)"><div class="sn" style="color:var(--grn)">'+nAlDia+'</div><div class="sl">Al dia</div></div>';
    if(novsbar){
      novsbar.innerHTML=
        '<span style="font-size:12px;color:var(--navy);font-weight:600">Novedades pendientes</span>'
        +'<span style="font-size:12.5px;color:var(--t2)">Pendientes: <strong style="color:var(--navy)">'+totalReg+'</strong></span>'
        +'<span style="font-size:12.5px;color:var(--t2)">CAS abiertos: <strong style="color:var(--red)">'+totalCas+'</strong></span>'
        +'<span style="margin-left:auto;background:var(--navy);color:#fff;font-size:12px;font-weight:600;padding:4px 14px;border-radius:20px">Total: '+totalNov+'</span>';
    }
  }
  var tbody=document.getElementById('ttbody');
  if(!tbody)return;
  if(filtered.length===0){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:28px;color:var(--t3);font-size:13px">No hay tiendas que coincidan con los filtros.</td></tr>';return;}
  var rows='';
  filtered.forEach(function(t){
    var rowCls=t.urg?'ru':t.hist2?'rh':'';
    var pbarCls=t.urg?'pbn':t.hist2?'pbg':'pbgn';
    var urgTag=t.urg?'<span class="utag">&#x1F6A9; Urgente</span>':'';
    var noteTag=sgnStoreComments(t.id).length?'<span class="htag" title="Tiene notas especiales">&#x1F4CC; Nota</span>':'';
    var regColor=t.reg>0?'color:var(--red);font-weight:600':'color:var(--t3)';
    var estBadge=t.est==='Urgente'?'br':t.est==='Pendiente'?'bg':'bgn';
    var paisLabel=PAISES[t.pais]||t.pregpais||t.pais;
    var btnHtml='<button class="btn bp bsm" onclick="goTienda('+t.id+')">Gestionar</button>';
    if(!isAg){
      var urgBtn=t.urg
        ?'<button class="btn bsm" onclick="sgnSMo(\'qu\','+t.id+')">Quitar urg.</button>'
        :'<button class="btn br2 bsm" onclick="sgnSMo(\'mu\','+t.id+')">Urgente</button>';
      btnHtml=urgBtn+btnHtml+'<button class="btn bgo bsm" onclick="goAnl('+t.id+')">Analizar</button>';
    }
    rows+='<tr class="'+rowCls+'">'
      +'<td><div class="tname"><div class="pbar '+pbarCls+'"></div><span class="tntext">'+sgnEsc(t.n)+'</span>'+urgTag+noteTag+'</div></td>'
      +'<td><span class="badge bgr">'+sgnEsc(t.cat)+'</span></td>'
      +'<td>'+paisLabel+'</td>'
      +'<td style="'+regColor+'">'+(t.reg||'&#x2014;')+'</td>'
      +'<td style="color:var(--t3)">&#x2014;</td>'
      +'<td><span class="badge '+estBadge+'">'+t.est+'</span></td>'
      +'<td><div class="acts">'+btnHtml+'</div></td>'
      +'</tr>';
  });
  tbody.innerHTML=rows;
  var legend=document.getElementById('tlegend');
  if(legend)legend.innerHTML='<div class="li">Datos sincronizados desde Dropi cada 10 minutos.</div>';
};

// ── modal de gestion: campos obligatorios de Dropi + notas de tienda ──
var sgnGestBase = sgnGest;
sgnGest = function(orderId){
  sgnGestBase(orderId);
  sgnInjectDropi('ok');
  sgnInjectDropi('dev');
  sgnModalComment();
};
function sgnInjectDropi(suf){
  var zone=document.getElementById('z-'+suf);
  var n=SGN.curOrd||{};
  if(!zone||document.getElementById('dc-'+suf))return;
  var div=document.createElement('div');
  div.innerHTML=
    '<div style="font-size:10.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin:10px 0 6px">Datos que Dropi exige para resolver</div>'

// ── guardar v3: payload completo para Dropi ──
guardar = async function(){
  if(!SGN.curOrd||!gAc)return;
  var n=SGN.curOrd;
  var acMap={ok:'contacto',no:'sin_contacto',rev:'en_revision',dev:'devolucion',cas:'cas'};
  var comentario=null,nota=null,motivo=null,solucion=null,suf=null;
  if(gAc==='ok'){suf='ok';solucion=document.getElementById('sd-ok').value.trim();comentario=document.getElementById('cm-ok').value.trim()||null;}
  if(gAc==='no')comentario=document.getElementById('cm-no').value.trim();
  if(gAc==='cas')comentario=document.getElementById('cm-cas').value.trim();
  if(gAc==='rev')nota=['Cliente aun no define fecha de entrega','Falta un dato de direccion','Se espera respuesta del dropshipper'][gNt-1]||null;
  if(gAc==='dev'){suf='dev';motivo=document.getElementById('gmot').value;solucion=document.getElementById('sd-dev').value.trim();}
  var b=document.getElementById('bguard');
  if(b){b.disabled=true;b.textContent='Guardando...';}

  var payload=null,resolved=null;
  if(suf){
    function val(id){var e=document.getElementById(id);return e?e.value.trim():'';}
    payload={
      solution: solucion||'',
      direccionConfirma: val('dc-'+suf)||n.direccion_corregida||n.direccion_actual||'',
      nombreConfirma: val('nc-'+suf)||n.client_name||'',
      selectValueConfirma: val('sv-'+suf)||'1'
    };
  }
  if(SGN.resolveEnDropi&&suf){
    resolved=await sgnFn('resolve-novedad',{
      order_id:n.order_id,variante:n.variante||'C',
      solution_text:solucion||'',
      solution_payload:payload
    });
    if(!(resolved&&resolved.ok)){
      var det=resolved&&resolved.dropi?(' Respuesta Dropi: '+JSON.stringify(resolved.dropi).slice(0,300)):'';
      alert('No se pudo aplicar la resolucion en Dropi: '+((resolved&&resolved.error)||'error')+det+'\n\nLa gestion quedara registrada igualmente, pero la novedad sigue abierta en Dropi.');
    }
  }

  var g=await SGN.client.from('gestiones').insert({
    order_id:n.order_id,store_name:n.store_name,agente_id:SGN.profile.id,
    accion:acMap[gAc],comentario:comentario,nota_revision:nota,motivo_devolucion:motivo,
    solucion_dropi:solucion,variante:n.variante,solution_payload:payload,
    resolved_in_dropi:resolved?!!resolved.ok:null
  });
  if(g.error){
    alert('Error al guardar la gestion: '+g.error.message);
    if(b){b.disabled=false;b.innerHTML='&#x2713; Guardar gestion';}
    return;
  }
  var resolvioOk=suf?(resolved&&resolved.ok):false;
  var nuevo=gAc==='rev'?'en_revision':gAc==='cas'?'cas_abierto':(gAc==='ok'||gAc==='dev')?(SGN.resolveEnDropi&&!resolvioOk?'pendiente':'resuelta'):'pendiente';
  await SGN.client.from('novedades').update({intentos:(n.intentos||0)+1,estado_local:nuevo,assigned_to:null}).eq('order_id',n.order_id);
  n.intentos=(n.intentos||0)+1;n.estado_local=nuevo;
  sgnBuildTiendas();
  closeMo('mog');setTimeout(function(){goPage('conf');},200);
};

function sgnAnlApply(){
  var prod=document.getElementById('anl-prod')?document.getElementById('anl-prod').value:'';
  var ciu=document.getElementById('anl-ciudad')?document.getElementById('anl-ciudad').value:'';
  var est=document.getElementById('anl-estado')?document.getElementById('anl-estado').value:'';
  var ts=document.getElementById('anl-tiposol')?document.getElementById('anl-tiposol').value:'';
  var canalMap=SGN.anlCanal||{};
  var novs=SGN.anlNovs.filter(function(n){
    if(prod&&n.producto!==prod)return false;
    if(ciu&&n.ciudad!==ciu)return false;
    if(est&&n.estado_local!==est)return false;
    if(ts&&(canalMap[n.order_id]||'')!==ts)return false;
    return true;
  });
  var total=novs.length,act=0,res=0,cer=0,cas=0;
  var causales={},estados={};
  novs.forEach(function(n){
    if(n.estado_local==='pendiente'||n.estado_local==='en_revision')act++;
    else if(n.estado_local==='cas_abierto'){act++;cas++;}
    else if(n.estado_local==='resuelta')res++;
    else if(n.estado_local==='cerrada_broker')cer++;
    var c=n.tipo_novedad||'Sin causal';
    causales[c]=(causales[c]||0)+1;
    estados[n.estado_local]=(estados[n.estado_local]||0)+1;
  });
  var stats=document.getElementById('anl-stats');
  if(stats)stats.innerHTML=
    '<div class="sc"><div class="sn">'+total+'</div><div class="sl">Novedades (historico)</div></div>'
    +'<div class="sc" style="border-top:2px solid var(--amb)"><div class="sn" style="color:var(--amb)">'+act+'</div><div class="sl">Activas</div></div>'
    +'<div class="sc" style="border-top:2px solid var(--grn)"><div class="sn" style="color:var(--grn)">'+res+'</div><div class="sl">Resueltas por el equipo</div></div>'
    +'<div class="sc" style="border-top:2px solid var(--navy)"><div class="sn" style="color:var(--navy)">'+cer+'</div><div class="sl">Cerradas en Dropi</div></div>';
  var colores=['var(--red)','var(--gold)','var(--navy)','var(--grn)','var(--amb)','var(--t3)','var(--red)','var(--gold)'];
  var top=Object.keys(causales).map(function(k){return [k,causales[k]];}).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  var mx=top.length?top[0][1]:1;
  var ch='';
  top.forEach(function(c,i){
    var pct=total?Math.round(c[1]/total*100):0;
    ch+='<div class="crl"><span class="crln" title="'+sgnEsc(c[0])+'">'+sgnEsc(c[0].length>34?c[0].slice(0,32)+'…':c[0])+'</span><div class="crlbw"><div class="crlf" style="width:'+Math.round(c[1]/mx*100)+'%;background:'+colores[i%colores.length]+'"></div></div><span class="crlp">'+c[1]+' ('+pct+'%)</span></div>';
  });
  var elC=document.getElementById('anl-causales');
  if(elC)elC.innerHTML=ch||'<p style="font-size:12px;color:var(--t3);font-style:italic">Sin datos con estos filtros.</p>';
  var lblEst={pendiente:'Pendiente',en_revision:'En revision',cas_abierto:'CAS abierto',resuelta:'Resuelta (equipo)',cerrada_broker:'Cerrada en Dropi'};
  var colEst={pendiente:'var(--amb)',en_revision:'var(--navy)',cas_abierto:'var(--red)',resuelta:'var(--grn)',cerrada_broker:'var(--t3)'};
  var eh='';
  Object.keys(estados).forEach(function(k){
    var pct=total?Math.round(estados[k]/total*100):0;
    eh+='<div class="crl"><span class="crln">'+(lblEst[k]||k)+'</span><div class="crlbw"><div class="crlf" style="width:'+pct+'%;background:'+(colEst[k]||'var(--navy)')+'"></div></div><span class="crlp">'+estados[k]+' ('+pct+'%)</span></div>';
  });
  var elE=document.getElementById('anl-estados');
  if(elE)elE.innerHTML=eh||'<p style="font-size:12px;color:var(--t3);font-style:italic">Sin datos con estos filtros.</p>';
}

}
