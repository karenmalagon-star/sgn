    '<div class="mh"><div class="mt">Gestionar novedad <span style="font-size:11px;background:rgba(212,160,23,.25);color:#D4A017;padding:2px 8px;border-radius:20px;margin-left:5px;font-weight:500">'+il+'</span></div><button class="mc" onclick="closeMo(\'mog\')">&#xD7;</button></div>'
    +'<div class="mb">'
    +'<div class="ig"><div class="ii"><div class="il">Orden</div><div class="iv" style="font-family:monospace">#'+sgnEsc(id)+'</div></div><div class="ii"><div class="il">Tipo</div><div class="iv"><span class="rtag">&#x2713; Regular</span></div></div><div class="ii"><div class="il">Causal</div><div class="iv" style="font-size:12px">'+sgnEsc(ca)+'</div></div><div class="ii"><div class="il">Cliente</div><div class="iv">'+sgnEsc(cl)+'</div></div></div>'
    +'<div class="tel-card"><div><div class="tellbl">&#x1F4F1; Numero de celular</div><div class="telnum" id="gtel">'+sgnEsc(tel)+'</div><div class="telpais">'+sgnEsc(pa)+'</div></div>'
    +'<div class="telbts">'
    +'<button class="telbt tcall" onclick="window.location.href=\'tel:\'+document.getElementById(\'gtel\').textContent.replace(/\\s/g,\'\')">&#x1F4DE; Llamar</button>'
    +'<button class="telbt" style="background:#E7F7EC;color:#128C7E;border:1px solid rgba(18,140,126,.2)" onclick="openWA()">&#x1F4AC; WhatsApp</button>'
    +'<button class="telbt tcopy" id="cbtn" onclick="copyT()">&#x1F4CB; Copiar</button>'
    +'</div></div>'
    +mapsBtn
    +'<div><div style="font-size:11.5px;font-weight:500;color:var(--t2);margin-bottom:8px">Que ocurrio en esta gestion? <span style="color:var(--t3);font-weight:400">(registro interno)</span></div>'
    +'<div class="ag-grid">'
    +'<button class="ab" id="ab-ok" onclick="selAc(\'ok\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 014.49 13.8 19.79 19.79 0 011.43 5.23 2 2 0 013.41 3h3a2 2 0 012 1.72c.13.96.36 1.9.7 2.81a2 2 0 01-.45 2.11L7.91 10.9a16 16 0 006.29 6.29l1.06-1.06a2 2 0 012.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0122 18.19z"/></svg>Contacto con cliente'+cap('REGISTRO INTERNO','var(--t3)')+'</button>'
    +'<button class="ab" id="ab-no" onclick="selAc(\'no\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7 2 2 0 011.72 2v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.34 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>Sin contacto'+cap('REGISTRO INTERNO','var(--t3)')+'</button>'
    +'<button class="ab" id="ab-rev" onclick="selAc(\'rev\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>En revision'+cap('REGISTRO INTERNO','var(--t3)')+'</button>'
    +'<button class="ab" id="ab-dev" onclick="selAc(\'dev\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>Devolver al remitente'+cap('REGISTRO INTERNO','var(--t3)')+'</button>'
    +'<button class="ab" id="ab-cas" onclick="selAc(\'cas\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Abrir CAS'+cap('REGISTRO INTERNO','var(--t3)')+'</button>'
    +'<button class="ab" id="ab-tr" onclick="selTr()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>Solucionada por transportadora'+cap('REGISTRO INTERNO','var(--t3)')+'</button>'
    +'</div></div>'
    +'<div id="gal"></div>'

    // ── NOTAS INTERNAS (puro registro, sin Dropi) ──
    +'<div id="z-ok" style="display:none"><div class="fld"><label>Comentario <span class="req">Obligatorio</span> <span style="font-size:10.5px;color:var(--t3);font-weight:400">(nota interna: que se hablo en la llamada)</span></label><textarea id="cm-ok" placeholder="Ej: Cliente confirma que si recibira el pedido, se aclara la direccion..." oninput="updB()"></textarea></div></div>'
    +'<div id="z-no" style="display:none"><div class="fld"><label>Comentario <span class="req">Obligatorio</span> <span style="font-size:10.5px;color:var(--t3);font-weight:400">(nota interna del intento)</span></label><textarea id="cm-no" placeholder="Contexto del intento (no contesto, buzon, etc.)..." oninput="updB()"></textarea></div></div>'
    +'<div id="z-rev" style="display:none"><div class="fld"><label>Motivo de revision</label><div style="display:flex;flex-direction:column;gap:5px;margin-top:5px"><button class="nbt" id="nb1" onclick="selNt(1)">&#x1F550; Cliente aun no define fecha de entrega</button><button class="nbt" id="nb2" onclick="selNt(2)">&#x1F4CD; Falta un dato de direccion</button><button class="nbt" id="nb3" onclick="selNt(3)">&#x1F464; Se espera respuesta del dropshipper</button></div></div></div>'
    +'<div id="z-dev" style="display:none"><div class="fld"><label>Nota interna <span style="font-size:10.5px;color:var(--t3);font-weight:400">(opcional: por que se devuelve — el motivo y detalle del return van en Solucion Dropi)</span></label><textarea id="cm-dev" placeholder="Contexto para el equipo..." oninput="updB()"></textarea></div></div>'
    +'<div id="z-cas" style="display:none"><div class="fld"><label>Descripcion del CAS <span class="req">Obligatorio</span></label><textarea id="cm-cas" placeholder="Describe el motivo del CAS..." oninput="updB()"></textarea></div></div>'

    // ── SOLUCION DROPI (seccion independiente; obligatoria solo para Contacto/Sin contacto/Devolver) ──
    +'<div id="z-soldropi" style="display:none">'
    +'<div style="font-size:11.5px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.04em;margin:15px 0 7px;padding-top:13px;border-top:1px dashed var(--bdr2)">&#x1F4E6; Solucion Dropi <span style="font-weight:400;color:var(--t3);text-transform:none;letter-spacing:0">(obligatoria para cerrar esta novedad en Dropi)</span></div>'
    +'<button class="nbt" id="sol-cargar" onclick="sgnCargarOpciones()" style="border-color:var(--navy);color:var(--navy);font-weight:600;margin-bottom:5px">&#x1F50E; Ver opciones reales de Dropi (recomendado)</button>'
    +'<div id="z-sol-opciones" style="display:none;margin-bottom:8px"></div>'
    +'<div style="font-size:10.5px;color:var(--t3);margin:4px 0 5px">&#x2014; o usa una opcion manual &#x2014;</div>'
    +'<div style="display:flex;flex-direction:column;gap:5px">'
    +'<button class="nbt" id="sol-reoffer" onclick="selSol(\'reoffer\')">&#x1F504; Volver a ofrecer — reprogramar la entrega con los datos confirmados</button>'
    +'<button class="nbt" id="sol-return" onclick="selSol(\'return\')">&#x21A9; Return — devolver el pedido al remitente en Dropi</button>'
    +'<button class="nbt" id="sol-none" onclick="selSol(\'none\')">&#x1F4DD; Aun sin solucion — (la gestion NO se podra guardar)</button>'
    +'</div>'
    +'<div id="z-sol-reoffer" style="display:none;margin-top:11px">'
    +'<div class="fld"><label>Detalle de la solucion para Dropi <span class="req">Obligatorio</span></label><textarea id="sr-sol" placeholder="Lo que quedara en Dropi. Ej: Cliente confirma direccion y recibe, reprogramar entrega." oninput="updB()"></textarea></div>'
    +'<div class="fld" style="margin-top:9px"><label>Direccion confirmada <span class="req">Obligatorio</span></label><input type="text" id="sr-dir" style="'+inputStyle+'" value="'+sgnEsc(n.direccion_corregida||n.direccion_actual||'')+'" oninput="updB()"></div>'
    +'<div class="tf" style="margin-top:9px"><div class="fld"><label>Nombre confirma</label><input type="text" id="sr-nom" style="'+inputStyle+'" value="'+sgnEsc(n.client_name||'')+'"></div>'
    +'<div class="fld"><label>Select value Dropi</label><input type="text" id="sr-sv" style="'+inputStyle+'" value="1"></div></div>'
    +'</div>'
    +'<div id="z-sol-return" style="display:none;margin-top:11px">'
    +'<div class="fld"><label>Motivo de devolucion <span class="req">Obligatorio</span></label><select id="sr-mot" onchange="updB()" style="'+inputStyle+'">'+motOpts+'</select></div>'
    +'<div class="fld" style="margin-top:9px"><label>Detalle de la solucion para Dropi <span class="req">Obligatorio</span></label><textarea id="sr-rsol" placeholder="Lo que quedara en Dropi para la devolucion..." oninput="updB()"></textarea></div>'
    +'</div>'
    +'</div>'
    +'<div><div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px">Historial de gestiones</div><p style="font-size:12px;color:var(--t3);font-style:italic">Cargando historial...</p></div>'
    +'</div>'
    +'<div class="mf"><button class="btn bsm" onclick="closeMo(\'mog\')">Cancelar</button><button class="btn bp bsm" id="bguard" disabled onclick="guardar()" style="padding:6px 16px">&#x2713; Guardar gestion</button></div>';
  document.getElementById('mog').classList.add('open');
};

// Notas internas que EXIGEN una solucion aplicada en Dropi para poder guardar.
var DROPI_REQ={ok:1,no:1,dev:1};
selAc = function(t){
  gAc=t;gNt=null;gSol=null;gOpcion=null;
  document.querySelectorAll('.ab').forEach(function(b){b.classList.remove('sel');});
  var ab=document.getElementById('ab-'+t);if(ab)ab.classList.add('sel');
  ['ok','no','rev','dev','cas'].forEach(function(z){var e=document.getElementById('z-'+z);if(e)e.style.display='none';});
  var zsd=document.getElementById('z-soldropi');if(zsd)zsd.style.display='none';
  ['sol-reoffer','sol-return','sol-none'].forEach(function(i){var b=document.getElementById(i);if(b)b.classList.remove('sel');});
  ['z-sol-reoffer','z-sol-return'].forEach(function(i){var e=document.getElementById(i);if(e)e.style.display='none';});
  var zso=document.getElementById('z-sol-opciones');if(zso){zso.style.display='none';zso.innerHTML='';}
  var gal=document.getElementById('gal');if(gal)gal.innerHTML='';
  document.querySelectorAll('#z-rev .nbt').forEach(function(b){b.classList.remove('sel');});
  var map={ok:'z-ok',no:'z-no',rev:'z-rev',dev:'z-dev',cas:'z-cas'};
  if(map[t]){var e=document.getElementById(map[t]);if(e)e.style.display='block';}
  var needDropi=!!DROPI_REQ[t];
  if(needDropi&&zsd)zsd.style.display='block';
  if(gal){
    if(needDropi)gal.innerHTML='<div class="al an" style="font-size:12px">Registro interno + <strong>Solucion Dropi obligatoria</strong> (Volver a ofrecer o Return). Sin solucion aplicada no se puede guardar.</div>';
    if(t==='rev')gal.innerHTML='<div class="al ag" style="font-size:12px">&#x1F550; Registro interno: la novedad queda "En revision" por el tiempo del proceso. No se envia nada a Dropi.</div>';
    if(t==='cas')gal.innerHTML='<div class="al ag" style="font-size:12px">&#x1F4CB; Registro interno: se abre un CAS. No se envia nada a Dropi.</div>';
  }
  updB();
};

selSol = function(t){
  gSol=t;gOpcion=null;
  ['sol-reoffer','sol-return','sol-none'].forEach(function(i){var b=document.getElementById(i);if(b)b.classList.toggle('sel',i==='sol-'+t);});
  document.querySelectorAll('#z-sol-opciones .nbt').forEach(function(b){b.classList.remove('sel');});
  var fz=document.getElementById('z-sol-opcion-fields');if(fz){fz.style.display='none';fz.innerHTML='';}
  var zr=document.getElementById('z-sol-reoffer'),zt=document.getElementById('z-sol-return');
  if(zr)zr.style.display=t==='reoffer'?'block':'none';
  if(zt)zt.style.display=t==='return'?'block':'none';
  updB();
}

// Fase 2: cargar el menu REAL de opciones de Dropi y resolver con la opcion elegida
sgnCargarOpciones = async function(){
  var cont=document.getElementById('z-sol-opciones');if(!cont||!SGN.curOrd)return;
  cont.style.display='block';
  cont.innerHTML='<p style="font-size:12px;color:var(--t3)">Cargando opciones de Dropi...</p>';
  var r=await sgnFn('opciones-novedad',{order_id:SGN.curOrd.order_id});
  if(!r||!r.ok){cont.innerHTML='<div class="al ag" style="font-size:12px">No se pudieron cargar las opciones de Dropi'+(r&&r.error?(' ('+sgnEsc(String(r.error))+')'):'')+'. Usa una opcion manual abajo.</div>';return;}
  var ops=r.opciones||[];SGN.curOpciones=ops;
  if(!ops.length){cont.innerHTML='<div class="al ag" style="font-size:12px">Dropi no devolvio opciones para esta novedad. Usa una opcion manual.</div>';return;}
  var html='<div style="font-size:11px;color:var(--t3);margin-bottom:6px">Opciones reales de Dropi'+(r.variante?(' &middot; variante '+sgnEsc(r.variante)):'')+':</div><div style="display:flex;flex-direction:column;gap:5px">';
  ops.forEach(function(o,i){html+='<button class="nbt" id="opc-'+i+'" onclick="selOpcionDropi('+i+')">'+sgnEsc(o.label||o.id)+(o.tipo?(' <span style="color:var(--t3);font-size:10px">('+sgnEsc(o.tipo)+')</span>'):'')+'</button>';});
  html+='</div><div id="z-sol-opcion-fields" style="display:none;margin-top:10px"></div>';
  cont.innerHTML=html;
};
selOpcionDropi = function(i){
  var o=(SGN.curOpciones||[])[i];if(!o)return;
  gSol='opcion';gOpcion=o.id;gOpcionLabel=o.label||o.id;gOpcionReq=o.requiere||[];
  (SGN.curOpciones||[]).forEach(function(_,j){var b=document.getElementById('opc-'+j);if(b)b.classList.toggle('sel',j===i);});
  ['sol-reoffer','sol-return','sol-none'].forEach(function(id){var b=document.getElementById(id);if(b)b.classList.remove('sel');});
  var zr=document.getElementById('z-sol-reoffer'),zt=document.getElementById('z-sol-return');if(zr)zr.style.display='none';if(zt)zt.style.display='none';
  var needDir=gOpcionReq.indexOf('direccion_corregida')>-1;
  var st='font-size:12.5px;padding:7px 11px;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--sur);color:var(--tx);font-family:inherit;width:100%;margin-top:3px';
  var fz=document.getElementById('z-sol-opcion-fields');
  if(fz){fz.style.display='block';
    fz.innerHTML='<div class="fld"><label>Detalle / nota de la solucion <span class="req">Obligatorio</span></label><textarea id="opc-sol" placeholder="Ej: Cliente confirma, reintentar entrega" oninput="updB()"></textarea></div>'+(needDir?'<div class="fld" style="margin-top:9px"><label>Direccion corregida <span class="req">Obligatorio</span></label><input type="text" id="opc-dir" value="'+sgnEsc((SGN.curOrd&&(SGN.curOrd.direccion_corregida||SGN.curOrd.direccion_actual))||'')+'" oninput="updB()" style="'+st+'"></div>':'');
  }
  updB();
};

updB = function(){
  var b=document.getElementById('bguard');if(!b)return;
  function v(id){var e=document.getElementById(id);return e?e.value.trim():'';}
  if(!gAc){b.disabled=true;return;}
  // 1) requisito de la nota interna
  var internoOk=true;
  if(gAc==='ok')internoOk=!!v('cm-ok');
  else if(gAc==='no')internoOk=!!v('cm-no');
  else if(gAc==='rev')internoOk=!!gNt;
  else if(gAc==='cas')internoOk=!!v('cm-cas');
  // 'dev': nota interna opcional
  if(!internoOk){b.disabled=true;return;}
  // 2) requisito de Solucion Dropi (solo Contacto/Sin contacto/Devolver)
  if(DROPI_REQ[gAc]){
    if(gSol==='opcion'&&gOpcion){var dirOk=(gOpcionReq.indexOf('direccion_corregida')===-1)||!!v('opc-dir');b.disabled=!(v('opc-sol')&&dirOk);return;}
    if(gSol==='reoffer'){b.disabled=!(v('sr-sol')&&v('sr-dir'));return;}
    if(gSol==='return'){b.disabled=!(v('sr-mot')&&v('sr-rsol'));return;}
    b.disabled=true;return; // 'none' o sin elegir -> no se puede guardar
  }
  // 3) rev/cas -> solo registro interno
  b.disabled=false;
};

guardar = async function(){
  if(!SGN.curOrd||!gAc)return;
  var n=SGN.curOrd;
  function v(id){var e=document.getElementById(id);return e?e.value.trim():'';}
  var acMap={ok:'contacto',no:'sin_contacto',rev:'en_revision',dev:'devolucion',cas:'cas'};
  var comentario=null,nota=null,motivo=null,solucion=null,payload=null,resolver=false;
  // nota interna segun la tarjeta
  if(gAc==='ok')comentario=v('cm-ok');
  if(gAc==='no')comentario=v('cm-no');
  if(gAc==='cas')comentario=v('cm-cas');
  if(gAc==='dev')comentario=v('cm-dev')||null;
  if(gAc==='rev')nota=['Cliente aun no define fecha de entrega','Falta un dato de direccion','Se espera respuesta del dropshipper'][gNt-1]||null;
  // Solucion Dropi (campo independiente; solo Contacto/Sin contacto/Devolver la exigen)
  if(DROPI_REQ[gAc]){
    if(gSol==='opcion'&&gOpcion){
      solucion=v('opc-sol');resolver=true;
      payload={tipo_solucion:'opcion',opcion:gOpcion,label:gOpcionLabel,solution:solucion,direccion_corregida:v('opc-dir')||undefined};
    } else if(gSol==='reoffer'){
      solucion=v('sr-sol');resolver=true;
      payload={solution:solucion,direccionConfirma:v('sr-dir'),nombreConfirma:v('sr-nom')||n.client_name||'',selectValueConfirma:v('sr-sv')||'1',tipo_solucion:'volver_a_ofrecer'};
    } else if(gSol==='return'){
      motivo=v('sr-mot');solucion=v('sr-rsol');resolver=true;
      payload={solution:solucion,motivo_devolucion:motivo,tipo_solucion:'return'};
    } else {
      // sin solucion Dropi -> no se debe guardar (la novedad sigue vigente)
      alert('Esta gestion exige una Solucion Dropi. Elige una opcion real de Dropi (recomendado) o una opcion manual.');
      return;
    }
  }
  var b=document.getElementById('bguard');
  if(b){b.disabled=true;b.textContent='Guardando...';}

  var resolved=null;
  if(SGN.resolveEnDropi&&resolver){
    resolved=await sgnFn('resolve-novedad',{
      order_id:n.order_id,variante:n.variante||'C',
      opcion:(payload&&payload.opcion)?payload.opcion:undefined,
      solution_text:solucion||'',
      direccion_corregida:(payload&&(payload.direccion_corregida||payload.direccionConfirma))||undefined,
      solution_payload:payload
    });
    if(!(resolved&&resolved.ok)){
      var motivo=(resolved&&(resolved.reason||resolved.error))||'sin detalle';
      alert('⚠️ Dropi NO aplico la solucion: la novedad queda PENDIENTE para gestion manual.\n\nMotivo de Dropi: '+motivo+'\n\n(La nota interna y el intento si quedan registrados.)');
    }
  }

  var g=await SGN.client.from('gestiones').insert({
    order_id:n.order_id,store_name:n.store_name,agente_id:SGN.profile.id,
    accion:acMap[gAc],comentario:comentario,nota_revision:nota,motivo_devolucion:motivo,
    solucion_dropi:solucion,variante:n.variante,solution_payload:payload,
    resolved_in_dropi:resolver?(resolved?!!resolved.ok:null):null
  });
  if(g.error){
    alert('Error al guardar la gestion: '+g.error.message);
    if(b){b.disabled=false;b.innerHTML='&#x2713; Guardar gestion';}
    return;
  }
  var resolvioOk=resolver&&resolved&&resolved.ok;
  var nuevo=gAc==='rev'?'en_revision':gAc==='cas'?'cas_abierto':resolvioOk?'resuelta':'pendiente';
  await SGN.client.from('novedades').update({intentos:(n.intentos||0)+1,estado_local:nuevo,assigned_to:null}).eq('order_id',n.order_id);
  n.intentos=(n.intentos||0)+1;n.estado_local=nuevo;
  sgnBuildTiendas();
  closeMo('mog');setTimeout(function(){goPage('conf');},200);
};

</script>
